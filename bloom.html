          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:11,color:T.a,fontWeight:700}}>$</span>
            <input type="number" placeholder="Amount" value={newPay.amt} onChange={e=>setNewPay(p=>({...p,amt:e.target.value}))} style={{width:"100%",padding:"7px 7px 7px 19px",borderRadius:10,border:`1.5px solid ${T.a}28`,background:`${T.a}08`,fontSize:13,color:T.text,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <input type="text" placeholder="Note" value={newPay.note} onChange={e=>setNewPay(p=>({...p,note:e.target.value}))} style={{padding:"7px 10px",borderRadius:10,border:`1.5px solid ${T.a}28`,background:`${T.a}08`,fontSize:13,color:T.text,outline:"none"}}/>
          <input type="date" value={newPay.date?newPay.date.split("T")[0]:""} onChange={e=>setNewPay(p=>({...p,date:e.target.value}))} style={{padding:"7px 8px",borderRadius:10,border:`1.5px solid ${T.a}28`,background:T.card,fontSize:12,color:T.text,outline:"none",colorScheme:T.dark?"dark":"light"}}/>
        </div>
        <Btn T={T} full onClick={onPay}>+ Log Payment</Btn>
      </Card>
      <button onClick={()=>setShowAddD(!showAddD)} style={{width:"100%",padding:"9px",borderRadius:12,background:showAddD?`${T.a2}12`:T.card,border:`1.5px dashed ${T.a2}45`,fontSize:12,fontWeight:700,color:T.a2,cursor:"pointer",marginBottom:11}}>{showAddD?"✕ Cancel":"+ Add New Debt"}</button>
      {showAddD&&<Card T={T} style={{padding:"13px 14px",marginBottom:11}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
          <input placeholder="Debt name" value={ndf.name} onChange={e=>setNdf(f=>({...f,name:e.target.value}))} style={{gridColumn:"1/-1",padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.a}28`,background:`${T.a}08`,fontSize:13,color:T.text,outline:"none"}}/>
          {[{p:"Balance ($)",k:"bal"},{p:"APR (%)",k:"apr"},{p:"Min Payment ($)",k:"min"}].map(f=>(
            <input key={f.k} type="number" placeholder={f.p} value={ndf[f.k]} onChange={e=>setNdf(x=>({...x,[f.k]:e.target.value}))} style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.a}28`,background:`${T.a}08`,fontSize:13,color:T.text,outline:"none"}}/>
          ))}
        </div>
        <Btn T={T} full onClick={onAddDebt} accent={T.a2}>Add Debt</Btn>
      </Card>}
      {sorted.map(d=>{
        const pays=dpays[d.id]||[],paid=pays.reduce((s,p)=>s+p.amt,0);
        const effPay=paid||d.min,m2=pmts(d.bal,d.apr,effPay),mi=d.bal*(d.apr/100/12);
        const principal=Math.max(0,paid-mi),isE=editD===d.id;
        return(
          <div key={d.id} style={{background:T.card,borderRadius:18,padding:"14px",border:`1.5px solid ${d.col}28`,marginBottom:10}}>
            <Row style={{marginBottom:9}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:T.text}}>{d.name}</div>
                <div style={{fontSize:11,color:d.apr>=25?T.danger:T.lt,marginTop:1}}>{d.apr>0?`${d.apr}% APR`:"0% APR"} · Min: {fmt(d.min)}/mo</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:700,color:d.col}}>{fmt(d.bal)}</div>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:1}}>
                  <button onClick={()=>setEditD(isE?null:d.id)} style={{fontSize:10,color:T.lt,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>{isE?"Done":"Edit"}</button>
                  <button onClick={()=>onDD(d.id)} style={{fontSize:10,color:T.danger,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Delete</button>
                </div>
              </div>
            </Row>
            {isE&&<div style={{background:`${d.col}0E`,borderRadius:11,padding:"10px",marginBottom:10,border:`1px solid ${d.col}20`}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                {[{lbl:"Balance",k:"bal"},{lbl:"APR %",k:"apr"},{lbl:"Min Pay",k:"min"}].map(f=>(
                  <div key={f.k}><div style={{fontSize:9,color:T.lt,marginBottom:2}}>{f.lbl}</div>
                  <input type="number" step={f.k==="apr"?"0.1":"1"} value={d[f.k]} onChange={e=>onDE({...d,[f.k]:parseFloat(e.target.value)||0})} style={{width:"100%",padding:"6px 8px",borderRadius:7,border:`1.5px solid ${d.col}35`,background:T.card,color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
                ))}
              </div>
            </div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:9}}>
              {[{lbl:"This Month",v:paid>0?fmt(paid):"—",sub:paid>0?`${pays.length} payment${pays.length!==1?"s":""}`:d.min>0?`Min: ${fmt(d.min)}`:"",c:paid>0?d.col:T.lt},
                {lbl:"Payoff Est.",v:plbl(m2),sub:isFinite(m2)?`${m2} mo at ${fmt(effPay)}/mo`:"⚠ increase payment",c:T.text},
                {lbl:"Interest/Mo",v:fmt(mi),sub:d.apr>0?`${d.apr}% APR`:"No interest",c:d.apr>=25?T.danger:T.lt},
              ].map((s,i)=>(
                <div key={i} style={{background:`${d.col}0F`,borderRadius:9,padding:"8px 9px",border:`1px solid ${d.col}18`}}>
                  <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>{s.lbl}</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:i===1?11:14,fontWeight:700,color:s.c,lineHeight:1.2}}>{s.v}</div>
                  <div style={{fontSize:9,color:T.lt,marginTop:2}}>{s.sub}</div>
                </div>
              ))}
            </div>
            <div style={{height:4,background:T.div,borderRadius:99,overflow:"hidden",marginBottom:6}}>
              <div style={{height:"100%",width:`${paid>0?Math.min((principal/paid)*100,100):Math.min(Math.max(0,d.min-mi)/Math.max(d.min,1)*100,100)}%`,background:T.a2,borderRadius:99}}/>
            </div>
            {pays.length>0&&<div style={{borderTop:`1px solid ${d.col}18`,paddingTop:7}}>
              <div style={{fontSize:10,color:T.lt,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.1em"}}>Payments This Month</div>
              {pays.map((p,i)=>(
                <Row key={i} style={{fontSize:12,marginBottom:3,alignItems:"center"}}>
                  <span style={{color:T.lt,flex:1}}>{p.note||new Date(p.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                  <span style={{fontWeight:700,color:T.a2,marginRight:8}}>{fmt(p.amt)}</span>
                  <button onClick={()=>{if(confirm(`Remove this ${fmt(p.amt)} payment?`))onDelPay(d.id,i);}} style={{width:18,height:18,borderRadius:"50%",border:`1px solid ${T.danger}40`,background:`${T.danger}0C`,color:T.danger,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,lineHeight:1}}>×</button>
                </Row>
              ))}
            </div>}
          </div>
        );
      })}
    </div>
  );
}

// ── Goals Tab ─────────────────────────────────────────────────────
function GoalsTab({T,goals,goalPays,onGoalEdit,onGoalDel,onGoalAdd,onGoalPay}){
  const [showAddG,setShowAddG]=useState(false);
  const [editG,setEditG]=useState(null);
  const [showContrib,setShowContrib]=useState(null);
  const [ng,setNg]=useState({name:"",ico:"🎯",target:"",saved:"",monthly:"",col:"#B5C9B8",targetDate:""});
  const [contrib,setContrib]=useState({amt:"",note:"",date:""});
  function addGoal(){
    if(!ng.name||!ng.target)return;
    onGoalAdd({id:"g"+Date.now(),name:ng.name,ico:ng.ico,target:parseFloat(ng.target)||0,saved:parseFloat(ng.saved)||0,monthly:parseFloat(ng.monthly)||0,col:ng.col,targetDate:ng.targetDate});
    setNg({name:"",ico:"🎯",target:"",saved:"",monthly:"",col:"#B5C9B8",targetDate:""});setShowAddG(false);
  }
  function logContrib(gid){
    if(!contrib.amt)return;onGoalPay(gid,parseFloat(contrib.amt)||0,contrib.note,contrib.date);
    setContrib({amt:"",note:"",date:""});setShowContrib(null);
  }
  return(
    <div>
      <Row style={{marginBottom:13}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:600,color:T.text}}>Savings Goals</div>
        <Btn T={T} onClick={()=>setShowAddG(!showAddG)} accent={T.a2} style={{padding:"6px 12px",fontSize:12}}>{showAddG?"✕ Cancel":"+ New Goal"}</Btn>
      </Row>
      {showAddG&&<Card T={T} style={{padding:"14px 16px",marginBottom:13}}>
        <div style={{display:"grid",gridTemplateColumns:"38px 1fr",gap:7,marginBottom:7}}>
          <input value={ng.ico} onChange={e=>setNg(g=>({...g,ico:e.target.value}))} style={{textAlign:"center",fontSize:17,border:`1.5px solid ${T.a2}28`,borderRadius:8,padding:"5px 2px",background:`${T.a2}08`,outline:"none",color:T.text}}/>
          <input placeholder="Goal name (e.g. Germany Trip, Emergency Fund)" value={ng.name} onChange={e=>setNg(g=>({...g,name:e.target.value}))} style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.a2}28`,background:`${T.a2}08`,fontSize:13,color:T.text,outline:"none"}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
          {[{p:"Target Amount ($)",k:"target"},{p:"Already Saved ($)",k:"saved"},{p:"Monthly Contribution ($)",k:"monthly"}].map(f=>(
            <input key={f.k} type="number" placeholder={f.p} value={ng[f.k]} onChange={e=>setNg(g=>({...g,[f.k]:e.target.value}))} style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.a2}28`,background:`${T.a2}08`,fontSize:13,color:T.text,outline:"none"}}/>
          ))}
          <input type="date" value={ng.targetDate} onChange={e=>setNg(g=>({...g,targetDate:e.target.value}))} style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.a2}28`,background:T.card,fontSize:12,color:T.text,outline:"none",colorScheme:T.dark?"dark":"light"}}/>
        </div>
        <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
          {GOAL_COLS.map(c=><button key={c} onClick={()=>setNg(g=>({...g,col:c}))} style={{width:22,height:22,borderRadius:"50%",background:c,border:ng.col===c?`2.5px solid ${T.text}`:"2px solid transparent",cursor:"pointer",flexShrink:0}}/>)}
        </div>
        <Btn T={T} full onClick={addGoal} accent={T.a2}>Add Goal</Btn>
      </Card>}
      {goals.length===0&&!showAddG&&<Card T={T} style={{padding:"24px 20px",marginBottom:13,textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:8}}>⭐</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:T.text,marginBottom:4}}>No goals yet</div>
        <div style={{fontSize:12,color:T.lt}}>Add your first savings goal — vacation, emergency fund, new car, anything.</div>
      </Card>}
      {goals.map(g=>{
        const pct=g.target>0?Math.min(100,Math.round(g.saved/g.target*100)):0;
        const rem=Math.max(0,g.target-g.saved);
        const mo2=g.monthly>0?Math.ceil(rem/g.monthly):Infinity;
        const est=isFinite(mo2)?new Date(Date.now()+mo2*30.4*86400000).toLocaleDateString("en-US",{month:"short",year:"numeric"}):"—";
        const isEG=editG===g.id;
        const isShowC=showContrib===g.id;
        const pays=goalPays[g.id]||[];
        const paidThisMo=pays.reduce((s,p)=>s+p.amt,0);
        const done=g.saved>=g.target;
        return(
          <div key={g.id} className={done?"celebrate":""} style={{background:T.card,borderRadius:18,padding:"15px",border:`1.5px solid ${done?T.a2+"60":g.col+"30"}`,marginBottom:12}}>
            {done&&<div style={{background:`${T.a2}18`,border:`1px solid ${T.a2}30`,borderRadius:10,padding:"8px 12px",marginBottom:10,textAlign:"center",fontSize:13,color:T.a2,fontWeight:700}}>🎉 Goal reached! You did it!</div>}
            <Row style={{marginBottom:11}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:22}}>{g.ico}</span>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:T.text}}>{g.name}</div>
                  <div style={{fontSize:11,color:T.lt,marginTop:1}}>Target {fmt(g.target)} · {fmt(g.monthly)}/mo</div>
                </div>
              </div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>setEditG(isEG?null:g.id)} style={{fontSize:10,color:T.lt,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>{isEG?"Done":"Edit"}</button>
                <button onClick={()=>onGoalDel(g.id)} style={{fontSize:10,color:T.danger,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Delete</button>
              </div>
            </Row>
            {isEG&&<div style={{background:`${g.col}0E`,borderRadius:11,padding:"11px",marginBottom:11,border:`1px solid ${g.col}20`}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                {[{lbl:"Name",k:"name",t:"text"},{lbl:"Target ($)",k:"target",t:"number"},{lbl:"Saved ($)",k:"saved",t:"number"},{lbl:"Monthly ($)",k:"monthly",t:"number"}].map(f=>(
                  <div key={f.k}><div style={{fontSize:9,color:T.lt,marginBottom:2}}>{f.lbl}</div>
                  <input type={f.t} value={g[f.k]} onChange={e=>onGoalEdit({...g,[f.k]:f.t==="number"?parseFloat(e.target.value)||0:e.target.value})} style={{width:"100%",padding:"6px 8px",borderRadius:7,border:`1.5px solid ${g.col}35`,background:T.card,color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
                ))}
              </div>
            </div>}
            <Row style={{fontSize:12,marginBottom:5}}><span style={{color:T.text,fontWeight:700}}>{fmt(g.saved)} saved</span><span style={{color:T.lt}}>{pct}% complete</span></Row>
            <div style={{height:9,background:T.div,borderRadius:99,overflow:"hidden",marginBottom:8}}>
              <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${g.col},${g.col}CC)`,borderRadius:99,transition:"width .6s"}}/>
            </div>
            <Row style={{fontSize:11,color:T.lt,marginBottom:10}}>
              <span>{fmt(rem)} remaining</span>
              <span>Est. {est} · {isFinite(mo2)?mo2+" mo away":"set contribution"}</span>
            </Row>
            {isShowC?(
              <div style={{background:`${g.col}0A`,borderRadius:12,padding:"11px",marginBottom:8,border:`1px solid ${g.col}20`}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:7}}>
                  <div style={{position:"relative"}}>
                    <span style={{position:"absolute",left:7,top:"50%",transform:"translateY(-50%)",fontSize:10,color:T.a2,fontWeight:700}}>$</span>
                    <input type="number" placeholder="Amount" value={contrib.amt} onChange={e=>setContrib(c=>({...c,amt:e.target.value}))} style={{width:"100%",padding:"6px 6px 6px 17px",borderRadius:9,border:`1.5px solid ${T.a2}28`,background:T.card,fontSize:13,color:T.text,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <input type="text" placeholder="Note" value={contrib.note} onChange={e=>setContrib(c=>({...c,note:e.target.value}))} style={{padding:"6px 9px",borderRadius:9,border:`1.5px solid ${T.a2}28`,background:T.card,fontSize:13,color:T.text,outline:"none"}}/>
                  <input type="date" value={contrib.date?contrib.date.split("T")[0]:""} onChange={e=>setContrib(c=>({...c,date:e.target.value}))} style={{padding:"6px 7px",borderRadius:9,border:`1.5px solid ${T.a2}28`,background:T.card,fontSize:11,color:T.text,outline:"none",colorScheme:T.dark?"dark":"light"}}/>
                </div>
                <div style={{display:"flex",gap:7}}>
                  <Btn T={T} full onClick={()=>logContrib(g.id)} accent={T.a2} style={{flex:2}}>✓ Log Contribution</Btn>
                  <Btn T={T} onClick={()=>setShowContrib(null)} accent={T.lt} outline style={{flex:1,padding:"7px 10px"}}>Cancel</Btn>
                </div>
              </div>
            ):(
              <button onClick={()=>setShowContrib(g.id)} style={{width:"100%",padding:"8px",borderRadius:10,background:`${g.col}14`,border:`1.5px dashed ${g.col}50`,fontSize:12,fontWeight:700,color:g.col,cursor:"pointer"}}>+ Log Contribution</button>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Net Worth Tab ─────────────────────────────────────────────────
function NetWorthTab({T,assets,onAssetVal,onAssetName,onAssetUpdate,onAddAsset,onDelAsset,totDebt,totAssets,netWorth,nwHist,saveNwSnap}){
  const [showPicker,setShowPicker]=useState(false);
  const [zState,setZState]=useState({});
  const nwPos=netWorth>=0;
  async function doZillow(id,address){
    if(!address?.trim())return;setZState(s=>({...s,[id]:{status:"loading"}}));
    const val=await fetchZillow(address);setZState(s=>({...s,[id]:val?{status:"found",value:val}:{status:"failed"}}));
  }
  return(
    <div>
      <Card T={T} style={{padding:"16px 18px",marginBottom:12,background:nwPos?`linear-gradient(135deg,${T.card},${T.a2}14)`:T.card,border:`1.5px solid ${nwPos?T.a2+"28":T.danger+"28"}`}}>
        <Row style={{marginBottom:11}}>
          <div><SL T={T} mb={3}>Total Assets</SL><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:T.a2}}>{fmt(totAssets)}</div></div>
          <div style={{textAlign:"right"}}><SL T={T} mb={3}>Total Liabilities</SL><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:T.danger}}>{fmt(totDebt)}</div></div>
        </Row>
        <Row style={{borderTop:`1px solid ${T.div}`,paddingTop:10,alignItems:"flex-end"}}>
          <span style={{fontSize:15,fontWeight:700}}>Net Worth</span>
          <div style={{textAlign:"right"}}>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:nwPos?T.a2:T.danger}}>{fmt(netWorth)}</span>
            <button onClick={()=>saveNwSnap(netWorth)} style={{display:"block",marginTop:2,marginLeft:"auto",fontSize:10,color:T.lt,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Save snapshot</button>
          </div>
        </Row>
        {nwHist.length>1&&(()=>{
          const vals=nwHist.map(h=>h.nw),mn=Math.min(...vals,0),mx=Math.max(...vals,0),rng=mx-mn||1;
          const zH=Math.max(0,Math.min(52,(-mn/rng)*52));
          return(<div style={{marginTop:12}}>
            <div style={{display:"flex",gap:3,alignItems:"flex-end",height:54,position:"relative"}}>
              <div style={{position:"absolute",bottom:zH,left:0,right:0,height:1,background:T.div,pointerEvents:"none"}}/>
              {nwHist.map((h,i)=>{
                const aZ=Math.max(0,h.nw)*52/rng,bZ=Math.max(0,-h.nw)*52/rng;
                return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"stretch",justifyContent:"flex-end",height:"100%"}} title={`${MO[h.mo].slice(0,3)} ${h.yr}: ${fmt(h.nw)}`}>
                  {h.nw>0&&<div style={{background:T.a2,borderRadius:"3px 3px 0 0",height:aZ,opacity:i===nwHist.length-1?1:.6}}/>}
                  {h.nw<0&&<div style={{background:T.danger,borderRadius:"0 0 3px 3px",height:bZ,opacity:i===nwHist.length-1?1:.6}}/>}
                </div>);
              })}
            </div>
            <div style={{display:"flex",gap:3,marginTop:3}}>{nwHist.map((h,i)=><div key={i} style={{flex:1,fontSize:7,textAlign:"center",color:T.lt}}>{MO[h.mo].slice(0,1)}</div>)}</div>
          </div>);
        })()}
      </Card>
      <Row style={{marginBottom:10}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:T.text}}>Your Assets</div>
        <Btn T={T} onClick={()=>setShowPicker(!showPicker)} accent={T.a2} style={{padding:"6px 12px",fontSize:12}}>{showPicker?"✕ Close":"+ Add Asset"}</Btn>
      </Row>
      {showPicker&&<Card T={T} style={{padding:"14px",marginBottom:11}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
          {Object.entries(ASSET_TYPES).map(([k,t])=>(
            <button key={k} onClick={()=>{onAddAsset(k);setShowPicker(false);}} style={{padding:"11px 5px",borderRadius:12,border:`1.5px solid ${T.a2}28`,background:`${T.a2}0A`,cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:20,marginBottom:3}}>{t.ico}</div>
              <div style={{fontSize:11,fontWeight:700,color:T.text}}>{t.lbl}</div>
            </button>
          ))}
        </div>
      </Card>}
      {assets.map(a=>{
        const isProp=a.type==="property";const zs=zState[a.id]||{};
        return(<div key={a.id} style={{background:T.card,borderRadius:16,padding:"14px 15px",border:`1.5px solid ${T.a2}20`,marginBottom:10}}>
          <Row style={{marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>{a.ico}</span>
              <input value={a.name} onChange={e=>onAssetName(a.id,e.target.value)} style={{fontSize:14,fontWeight:700,border:"none",background:"transparent",color:T.text,outline:"none",padding:0}}/>
            </div>
            <button onClick={()=>onDelAsset(a.id)} style={{fontSize:14,color:T.danger,background:"none",border:"none",cursor:"pointer",opacity:.7}}>×</button>
          </Row>
          {isProp&&<div style={{marginBottom:10,padding:"11px",borderRadius:11,background:`${T.a}08`,border:`1px solid ${T.a}18`}}>
            <div style={{fontSize:9,color:T.a,fontWeight:700,marginBottom:6}}>🏠 Zillow Lookup</div>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <input value={a.address||""} onChange={e=>onAssetUpdate(a.id,{address:e.target.value})} placeholder="123 Main St, City, ST 00000" style={{flex:1,fontSize:12,border:`1.5px solid ${T.a}28`,borderRadius:8,padding:"7px 9px",background:`${T.a}08`,color:T.text,outline:"none"}}/>
              <button onClick={()=>doZillow(a.id,a.address||"")} disabled={zs.status==="loading"} style={{padding:"7px 11px",borderRadius:8,border:`1.5px solid ${T.a}40`,background:`${T.a}14`,fontSize:13,fontWeight:700,color:T.a,cursor:"pointer"}}>{zs.status==="loading"?"…":"🔍"}</button>
            </div>
            {zs.status==="found"&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 11px",borderRadius:9,background:`${T.a2}12`,border:`1.5px solid ${T.a2}30`}}>
              <div><div style={{fontSize:9,color:T.a2,fontWeight:700,marginBottom:2}}>Zillow Zestimate®</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:T.a2}}>{fmt(zs.value)}</div></div>
              <Btn T={T} onClick={()=>{onAssetVal(a.id,zs.value);setZState(s=>({...s,[a.id]:{...zs,status:"imported"}}));}} accent={T.a2} style={{padding:"7px 12px",fontSize:12}}>Import ↓</Btn>
            </div>}
            {zs.status==="failed"&&<div style={{fontSize:11,color:T.sub,lineHeight:1.5}}>Zillow blocked auto-lookup. <a href={`https://www.zillow.com/homes/${encodeURIComponent(a.address||"")}_rb/`} target="_blank" rel="noreferrer" style={{color:T.a,fontWeight:700,textDecoration:"none"}}>Open Zillow ↗</a> and enter value below.</div>}
          </div>}
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:17,color:T.a2,fontFamily:"'Cormorant Garamond',serif",fontWeight:700}}>$</span>
            <input type="number" value={a.val||""} onChange={e=>onAssetVal(a.id,e.target.value)} placeholder="0"
              style={{width:"100%",padding:"9px 10px 9px 26px",fontSize:20,fontFamily:"'Cormorant Garamond',serif",fontWeight:700,border:`1.5px solid ${T.a2}28`,borderRadius:11,background:`${T.a2}09`,color:T.a2,outline:"none",boxSizing:"border-box"}}/>
          </div>
        </div>);
      })}
    </div>
  );
}

// ── Recurring Tab ─────────────────────────────────────────────────

          </div>

            <span style={{position:"absolute",left:7,top:"50%",transform:"translateY(-50%)",fontSize:10,color:T.a,fontWeight:700}}>$</span>

          <select value={nr.catId||""} onChange={e=>setNr(x=>({...x,catId:e.target.value}))} style={{gridColumn:"1/-1",padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.a}28`,background:T.card,color:T.text,fontSize:12,outline:"none",colorScheme:T.dark?"dark":"light"}}>
            <option value="">Budget category (optional)</option>
            {expCats.map(c=><option key={c.id} value={c.id}>{c.ico} {c.lbl}</option>)}
          </select>
        </div>
        <Btn T={T} full onClick={saveR}>Add Recurring Bill</Btn>
      </Card>}
      {recurringDebts.length===0&&!showAddR&&<div style={{textAlign:"center",padding:"16px 0",color:T.lt,fontSize:12}}>No recurring bills set up yet</div>}
      {recurringDebts.map(r=>(
        <div key={r.id} style={{background:T.card,borderRadius:13,padding:"12px 14px",border:`1.5px solid ${T.a}22`,marginBottom:8}}>
          <Row>
            <div><div style={{fontSize:14,fontWeight:700,color:T.text}}>{r.desc}</div>
            <div style={{fontSize:11,color:T.lt,marginTop:2}}>Day {r.day} · {r.account==="lc"?"LC":"SCU"}{r.catId?" · 📊 categorized":""}</div></div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:T.danger}}>-{fmt(Math.abs(parseFloat(r.amount)||0))}</div>
              <button onClick={()=>delRecurring(r.id)} style={{fontSize:13,color:T.danger,background:"none",border:"none",cursor:"pointer",opacity:.7}}>×</button>
            </div>
          </Row>
        </div>
      ))}
    </div>
  );
}

// ── Settings Tab ─────────────────────────────────────────────────
function SettingsTab({T,onTheme,onName,userName,doExp,accs,onAcc,onAddAcc,onDelAcc,darkMode,setDarkMode,lcStart,scuStart,onStartChange,notes,onNotes}){
  const [localName,setLocalName]=useState(userName);
  return(
    <div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:600,color:T.text,marginBottom:14}}>Settings</div>

      {/* Your name */}
      <Card T={T} style={{padding:"13px 15px",marginBottom:12}}>
        <SL T={T}>Your Name</SL>
        <div style={{display:"flex",gap:8}}>
          <input value={localName} onChange={e=>setLocalName(e.target.value)} placeholder="Your name for greetings…"
            style={{flex:1,padding:"8px 11px",borderRadius:10,border:`1.5px solid ${T.a}30`,background:`${T.a}09`,fontSize:13,color:T.text,outline:"none"}}/>
          <Btn T={T} onClick={()=>onName(localName)} style={{padding:"7px 14px",fontSize:12}}>Save</Btn>
        </div>
      </Card>

      {/* Theme */}
      <Card T={T} style={{padding:"13px 15px",marginBottom:12}}>
        <SL T={T}>Theme</SL>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
          {Object.entries(THEMES).map(([k,t])=>(
            <button key={k} onClick={()=>onTheme(k)}
              style={{padding:"11px",borderRadius:12,border:`2px solid ${T.name===t.name?T.a+"80":T.div}`,background:T.name===t.name?`${T.a}14`:T.card,cursor:"pointer",textAlign:"left",transition:"all .15s"}}>
              <div style={{fontSize:13,fontWeight:700,color:T.text}}>{t.name}</div>
              <div style={{fontSize:10,color:T.lt,marginTop:2}}>{t.desc}</div>
            </button>
          ))}
        </div>
        <button onClick={()=>{
          const pairs={bloom:"midnight",midnight:"bloom",stone:"carbon",carbon:"stone"};
          const cur=localStorage.getItem("bloomTheme")||"bloom";
          const next=pairs[cur]||"midnight";
          onTheme(next);
          setDarkMode(!T.dark);
        }} style={{width:"100%",marginTop:9,padding:"9px",borderRadius:10,border:`1.5px solid ${T.div}`,background:"transparent",fontSize:13,color:T.text,cursor:"pointer"}}>
          {T.dark?"☀️ Switch to Light Mode":"🌙 Switch to Dark Mode"}
        </button>
      </Card>

      {/* Account balances — unified: name + balance updates both ledger and budget */}
      <Card T={T} style={{padding:"13px 15px",marginBottom:12}}>
        <SL T={T}>Accounts</SL>
        <div style={{fontSize:11,color:T.lt,marginBottom:10,lineHeight:1.5}}>Name and current balance for each account. Updates balances everywhere in the app.</div>
        {[
          {ledgerKey:"lc",accKey:"lc",start:lcStart,name:accs.lc?.name||"Checking",col:T.a},
          {ledgerKey:"scu",accKey:"sc",start:scuStart,name:accs.sc?.name||"Savings",col:T.a2},
        ].map(a=>(
          <div key={a.ledgerKey} style={{marginBottom:12,background:`${a.col}08`,borderRadius:12,padding:"10px 12px",border:`1px solid ${a.col}20`}}>
            <div style={{fontSize:10,color:a.col,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Account {a.ledgerKey==="lc"?"1":"2"}</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input value={a.name}
                onChange={e=>{
                  const na={...accs,[a.accKey]:{...accs[a.accKey],name:e.target.value}};
                  setAccs(na);sA(na);
                }}
                placeholder="Account name"
                style={{flex:1,padding:"7px 10px",borderRadius:9,border:`1.5px solid ${a.col}30`,background:T.card,fontSize:13,color:T.text,outline:"none"}}/>
            </div>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:a.col,fontWeight:700}}>$</span>
              <input type="number" step="0.01" value={a.start}
                onChange={e=>onStartChange(a.ledgerKey,e.target.value)}
                placeholder="Current balance"
                style={{width:"100%",padding:"8px 8px 8px 22px",borderRadius:9,border:`1.5px solid ${a.col}30`,background:T.card,fontSize:14,fontFamily:"'Cormorant Garamond',serif",fontWeight:700,color:a.col,outline:"none",boxSizing:"border-box"}}/>
            </div>
          </div>
        ))}
      </Card>

      {/* Monthly notes */}
      <Card T={T} style={{padding:"13px 15px",marginBottom:12}}>
        <SL T={T}>Monthly Notes</SL>
        <textarea value={notes} onChange={e=>onNotes(e.target.value)} placeholder="Notes for this month…" rows={3}
          style={{width:"100%",padding:"9px 11px",borderRadius:10,border:`1.5px solid ${T.div}`,background:"rgba(255,255,255,0.5)",fontSize:13,color:T.text,outline:"none",resize:"none",fontFamily:"'Lato',sans-serif"}}/>
      </Card>

      {/* Export */}
      <Btn T={T} full onClick={doExp} accent={T.a2} style={{marginBottom:12}}>⬇ Export CSV</Btn>
      <button onClick={()=>{if(confirm("Reset setup wizard? This will walk you through account setup again on next load.\n\nYour data will not be deleted.")){localStorage.removeItem("bloomOnboarded");window.location.reload();}}} style={{width:"100%",padding:"9px",borderRadius:11,border:`1px solid ${T.div}`,background:"transparent",fontSize:12,color:T.lt,cursor:"pointer",marginBottom:20}}>
        ↺ Re-run setup wizard
      </button>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
