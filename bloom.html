// ── Math helpers ──────────────────────────────────────────────────
function pmts(bal,apr,pay){
  if(bal<=0)return 0;if(pay<=0)return Infinity;
  if(apr===0)return Math.ceil(bal/pay);
  const r=apr/100/12;if(pay<=bal*r)return Infinity;
  return Math.ceil(Math.log(pay/(pay-bal*r))/Math.log(1+r));
}
function totalInterest(bal,apr,pay){
  if(bal<=0||pay<=0)return 0;
  const m=pmts(bal,apr,pay);
  if(!isFinite(m))return Infinity;
  return Math.max(0,pay*m-bal);
}
function plbl(m){
  if(!isFinite(m)||m>600)return"Never at this rate";
  const d=new Date();d.setMonth(d.getMonth()+m);
  return d.toLocaleDateString("en-US",{month:"short",year:"numeric"});
}
function calcHealthScore(cats,budgets,actuals,debts,accs,totInc,totBal){
  let score=0,details=[];
  const minDebt=debts.reduce((s,d)=>s+d.min,0);
  const dti=totInc>0?minDebt/totInc:1;
  const dtiPts=dti<0.15?25:dti<0.20?20:dti<0.30?14:dti<0.40?7:0;
  score+=dtiPts;
  details.push({lbl:"Debt Load",pts:dtiPts,max:25,note:dti<0.15?"Excellent":dti<0.30?"Manageable":"High — focus here",icon:"💳"});
  const savBud=cats.filter(c=>c.g==="savings").reduce((s,c)=>s+(budgets[c.id]||0),0);
  const savRate=totInc>0?savBud/totInc:0;
  const savPts=savRate>0.20?25:savRate>0.15?20:savRate>0.10?15:savRate>0.05?10:3;
  score+=savPts;
  details.push({lbl:"Savings Rate",pts:savPts,max:25,note:`${Math.round(savRate*100)}% of income — ${savRate>0.15?"great":"aim for 15%+"}`,icon:"🌱"});
  const moExpenses=cats.filter(c=>!c.inc).reduce((s,c)=>s+(budgets[c.id]||0),0);
  const months=moExpenses>0?totBal/moExpenses:0;
  const cushPts=months>6?20:months>3?16:months>1?10:months>0.5?5:0;
  score+=cushPts;
  details.push({lbl:"Cash Cushion",pts:cushPts,max:20,note:`${months.toFixed(1)} months — ${months>3?"solid":"build to 3+"}`,icon:"🏦"});
  const totBud=cats.filter(c=>!c.inc).reduce((s,c)=>s+(budgets[c.id]||0),0);
  const totAct=cats.filter(c=>!c.inc).reduce((s,c)=>s+(actuals[c.id]||0),0);
  const over=totBud>0?(totAct-totBud)/totBud:0;
  const budPts=over<0.05?15:over<0.10?10:over<0.20?5:0;
  score+=budPts;
  details.push({lbl:"Budget Adherence",pts:budPts,max:15,note:over<0.05?"On track":over<0.20?"Slightly over":"Needs attention",icon:"📋"});
  const incCount=cats.filter(c=>c.inc&&(budgets[c.id]||0)>0).length;
  const divPts=incCount>=3?15:incCount===2?12:incCount===1?8:0;
  score+=divPts;
  details.push({lbl:"Income Diversity",pts:divPts,max:15,note:`${incCount} stream${incCount!==1?"s":""} — ${incCount>=2?"well diversified":"add more streams"}`,icon:"💼"});
  const grade=score>=85?"Excellent 🏆":score>=70?"Great 💚":score>=55?"Good 👍":score>=40?"Fair ⚠️":"Needs Work 🔧";
  return{score,grade,details};
}
function calc5030(cats,budgets){
  let needs=0,wants=0,savings=0;
  cats.filter(c=>!c.inc).forEach(c=>{
    const v=budgets[c.id]||0;
    const split=c.split||(GRP[c.g]?.split);
    if(split==="needs")needs+=v;
    else if(split==="savings")savings+=v;
    else wants+=v;
  });
  return{needs,wants,savings};
}
function resolveDebtCatId(debtName,cats){
  const key=(debtName||"").toLowerCase().trim();
  if(!key)return null;
  if(DEBT_ALIASES[key])return DEBT_ALIASES[key];
  const exact=cats.find(c=>c.g==="debt"&&c.lbl.toLowerCase().trim()===key);
  if(exact)return exact.id;
  const partial=cats.find(c=>c.g==="debt"&&(c.lbl.toLowerCase().includes(key)||key.includes(c.lbl.toLowerCase())));
  return partial?.id||null;
}

// ── Zillow ────────────────────────────────────────────────────────
async function fetchZillow(address){
  try{
    const proxy=`https://api.allorigins.win/raw?url=${encodeURIComponent("https://www.zillow.com/homes/"+encodeURIComponent(address.trim())+"_rb/")}`;
    const resp=await fetch(proxy,{signal:AbortSignal.timeout(9000)});
    if(!resp.ok)return null;
    const html=await resp.text();
    const m=html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
    if(m){
      const s=JSON.stringify(JSON.parse(m[1]));
      for(const p of[/"zestimate":(\d{5,})/,/"homeEstimate":(\d{5,})/,/"price":(\d{5,})/]){
        const f=s.match(p);if(f){const v=parseInt(f[1]);if(v>50000&&v<20000000)return v;}
      }
    }
    return null;
  }catch{return null;}
}

// ── Ledger auto-transaction generator ────────────────────────────
function generateAutoTxns(year,month,recurringDebts,incomeStreams){
  const result=[];
  const dim=daysInMonth(year,month);
  recurringDebts.filter(r=>r.active!==false).forEach(r=>{
    const day=Math.min(parseInt(r.day)||1,dim);
    result.push({
      id:"auto-debt-"+r.id+"-"+year+"-"+month,
      date:isoDate(year,month,day),desc:r.desc,
      amount:-(Math.abs(parseFloat(r.amount)||0)),
      account:r.account||"lc",note:"Auto · recurring",
      isAuto:true,autoType:"debt",catId:r.catId||null,
    });
  });
  incomeStreams.filter(s=>s.active!==false&&s.amount&&s.lastDate).forEach(s=>{
    const amt=parseFloat(s.amount)||0;
    if(!amt)return;
    const freq=s.frequency||"biweekly";
    const last=parseISO(s.lastDate);
    if(!last)return;
    let cursor=new Date(last.y,last.m,last.d);
    const start=new Date(year,month,1);
    const end=new Date(year,month+1,0);
    const step=freq==="weekly"?7:freq==="biweekly"?14:0;
    if(freq==="monthly"){
      result.push({id:"auto-inc-"+s.id+"-"+year+"-"+month,date:isoDate(year,month,Math.min(last.d,dim)),desc:s.name||"Paycheck",amount:amt,account:s.account||"lc",note:"Auto · monthly",isAuto:true,autoType:"income",catId:s.catId||null});
      return;
    }
    while(cursor>end)cursor=new Date(cursor.getTime()-step*86400000);
    while(cursor>=start)cursor=new Date(cursor.getTime()-step*86400000);
    cursor=new Date(cursor.getTime()+step*86400000);
    let safety=0;
    while(cursor<=end&&safety<10){
      safety++;
      if(cursor>=start)result.push({id:"auto-inc-"+s.id+"-"+year+"-"+month+"-"+cursor.getDate(),date:isoDate(year,month,cursor.getDate()),desc:s.name||"Paycheck",amount:amt,account:s.account||"lc",note:"Auto · "+freq,isAuto:true,autoType:"income",catId:s.catId||null});
      cursor=new Date(cursor.getTime()+step*86400000);
    }
  });
  return result.sort((a,b)=>a.date.localeCompare(b.date));
}

// ── CSV Export ────────────────────────────────────────────────────
function doExport(cats,budgets,actuals,goals,assets,totDebt,mo,yr,notes){
  const r=[[`Bloom — ${MO[mo]} ${yr}`],[],["BUDGET"],["Category","Group","Planned","Actual","Diff"]];
  Object.entries(GRP).forEach(([gid,g])=>cats.filter(c=>c.g===gid).forEach(c=>{
    const b=budgets[c.id]||0,a=actuals[c.id]||0;r.push([c.lbl,g.lbl,b,a,a-b]);
  }));
  if(goals.length){r.push([],["SAVINGS GOALS"],["Goal","Target","Saved","Monthly","% Done"]);
    goals.forEach(g=>r.push([g.name,g.target,g.saved,g.monthly,Math.round((g.saved/g.target)*100)+"%"]));
  }
  r.push([],["NET WORTH"],["Item","Value"]);
  assets.forEach(a=>r.push([a.name,a.val]));
  r.push(["Total Liabilities",-totDebt],["NET WORTH",assets.reduce((s,a)=>s+a.val,0)-totDebt]);
  if(notes)r.push([],["MONTHLY NOTES"],[notes]);
  const csv=r.map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`bloom-${yr}-${String(mo+1).padStart(2,"0")}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

  const [lcReset,setLcReset]=useState(null);
  const [scuReset,setScuReset]=useState(null);
  const [recurringDebts,setRecurringDebts]=useState([]);
  const [incomeStreams,setIncomeStreams]=useState([]);
  const [showAddTxn,setShowAddTxn]=useState(false);
  const [editTxnId,setEditTxnId]=useState(null);
  const [acctFilter,setAcctFilter]=useState("all");
  const [descFilter,setDescFilter]=useState("");

  // Onboarding completion handler
  function onOnboardingComplete({name,acct1,acct2,income,startFresh}){
    localStorage.setItem("bloomOnboarded","1");
    if(name){setUserName(name);localStorage.setItem("bloomName",name);}
    const lc1=parseFloat(acct1.bal)||0, lc2=parseFloat(acct2.bal)||0;
    const newAccs={
      lc:{name:acct1.name||"Checking",bal:lc1,col:"#C9907A",type:"checking"},
      sc:{name:acct2.name||"Savings",bal:lc2,col:"#7A9A80",type:"checking"},
    };
    setAccs(newAccs);sA(newAccs);
    setLcStart(lc1);setScuStart(lc2);
    saveSettings(lc1,lc2,null,null);
    if(startFresh){
      const freshCats=[
        {id:"inc1",lbl:"Monthly Income",ico:"💰",g:"income",def:income||0,inc:true,rec:false},
        {id:"hous1",lbl:"Housing",ico:"🏠",g:"housing",def:0,rec:true},
        {id:"food1",lbl:"Groceries",ico:"🛒",g:"family",def:0,rec:false,split:"needs"},
        {id:"bill1",lbl:"Bills & Subscriptions",ico:"📄",g:"bills",def:0,rec:true},
        {id:"hlth1",lbl:"Health",ico:"💊",g:"health",def:0,rec:false},
        {id:"sav1",lbl:"Savings",ico:"🌱",g:"savings",def:0,rec:false},
        {id:"debt1",lbl:"Debt Payments",ico:"💳",g:"debt",def:0,rec:true},
      ];
      const freshB=Object.fromEntries(freshCats.map(c=>[c.id,c.def]));
      setCats(freshCats);sCats(freshCats);
      setBudgets(freshB);setActuals({});sB(freshB,{});
      setDebts([]);sD([]);
    } else if(income>0){
      const firstInc=cats.find(c=>c.inc);
      if(firstInc){const nb={...budgets,[firstInc.id]:income};setBudgets(nb);sB(nb,actuals);}
    }
    setOnboarded(true);
    // Trigger data loads now that onboarding is done
    setTimeout(()=>{loadBudget();loadLedger();},50);
  }

  // Load all data — only after onboarding is complete
  useEffect(()=>{if(onboarded)loadBudget();},[viewMonth,viewYear,onboarded]);
  useEffect(()=>{if(onboarded)loadLedger();},[onboarded]);

  async function loadBudget(){
    setLoad(true);
    try{
      const[bR,dR,pR,aR,cR,gR,nR,asR,nwR,gpR,irR]=await Promise.all([
        dbGet(`bud-${viewYear}-${viewMonth}`),dbGet("debts-v1"),dbGet(`dpay-${viewYear}-${viewMonth}`),
        dbGet("accs-v1"),dbGet("cats-v2"),dbGet("goals-v2"),
        dbGet(`notes-${viewYear}-${viewMonth}`),dbGet("assets-v1"),dbGet("nw-hist-v1"),
        dbGet(`gpay-${viewYear}-${viewMonth}`),dbGet("irrinc-v1"),
      ]);
      const lc=cR?.budgets?.cats||BLANK_CATS.map(c=>({...c}));setCats(lc);
      const savedB=bR?.budgets||{},savedA=bR?.actuals||{};
      setBudgets({...initB(lc),...savedB});setActuals(savedA);
      if(dR?.budgets?.d){
        const restored=dR.budgets.d.map(d=>{
          if(d.catId)return d;
          const catId=resolveDebtCatId(d.name,lc);
          return catId?{...d,catId}:d;
        });
        setDebts(restored);
      }
      setDpays(pR?.budgets?.p||{});
      if(aR?.budgets?.a)setAccs(aR.budgets.a);
      if(gR?.budgets?.g)setGoals(gR.budgets.g);
      setNotes(nR?.budgets?.notes||"");
      if(asR?.budgets?.as)setAssets(asR.budgets.as);
      if(nwR?.budgets?.h)setNwHist(nwR.budgets.h);
      setGoalPays(gpR?.budgets?.p||{});
      if(irR?.budgets?.ir){setIrregIncome(irR.budgets.ir.on||false);setPastIncome(irR.budgets.ir.past||{m1:"",m2:"",m3:""});}
    }catch(e){console.error(e);}
    setLoad(false);
  }
  async function loadLedger(){
    try{
      const[tR,sR,rR,iR]=await Promise.all([dbGet("lgr-txns"),dbGet("lgr-settings"),dbGet("lgr-recurring"),dbGet("lgr-income")]);
      if(tR?.budgets?.txns)setTxns(tR.budgets.txns);
      if(sR?.budgets){
        if(sR.budgets.lcStart!=null)setLcStart(sR.budgets.lcStart);
        if(sR.budgets.scuStart!=null)setScuStart(sR.budgets.scuStart);
        if(sR.budgets.lcReset)setLcReset(sR.budgets.lcReset);
        if(sR.budgets.scuReset)setScuReset(sR.budgets.scuReset);
      }
      if(rR?.budgets?.list)setRecurringDebts(rR.budgets.list);
      if(iR?.budgets?.list)setIncomeStreams(iR.budgets.list);
    }catch(e){console.error(e);}
  }

  const sv=useCallback((k,fn)=>{
    clearTimeout(tmr.current[k]);
    tmr.current[k]=setTimeout(async()=>{setSync("saving");try{await fn();setSync("saved");setTimeout(()=>setSync("idle"),2500);}catch{setSync("error");}},700);
  },[]);

  // Budget save helpers
  const sB=(b,a)=>sv("b",()=>dbSet(`bud-${viewYear}-${viewMonth}`,{month:viewMonth,year:viewYear,budgets:b,actuals:a}));
  const sD=d=>sv("d",()=>dbSet("debts-v1",{budgets:{d}}));
  const sP=p=>sv("p",()=>dbSet(`dpay-${viewYear}-${viewMonth}`,{month:viewMonth,year:viewYear,budgets:{p}}));
  const sA=a=>sv("a",()=>dbSet("accs-v1",{budgets:{a}}));
  const sCats=c=>sv("c",()=>dbSet("cats-v2",{budgets:{cats:c}}));
  const sGoals=g=>sv("g",()=>dbSet("goals-v2",{budgets:{g}}));
  const sNotes=n=>sv("n",()=>dbSet(`notes-${viewYear}-${viewMonth}`,{month:viewMonth,year:viewYear,budgets:{notes:n}}));
  const sAssets=as=>sv("as",()=>dbSet("assets-v1",{budgets:{as}}));
  const sNwHist=h=>sv("nw",()=>dbSet("nw-hist-v1",{budgets:{h}}));
  const sGP=p=>sv("gp",()=>dbSet(`gpay-${viewYear}-${viewMonth}`,{month:viewMonth,year:viewYear,budgets:{p}}));
  const sIR=v=>sv("ir",()=>dbSet("irrinc-v1",{budgets:{ir:v}}));
  // Ledger save helpers
  const saveTxns=t=>sv("lt",()=>dbSet("lgr-txns",{budgets:{txns:t}}));
  const saveSettings=(lc,scu,lcR,scuR)=>sv("ls",()=>dbSet("lgr-settings",{budgets:{lcStart:lc,scuStart:scu,lcReset:lcR,scuReset:scuR}}));
  const saveRecurring=r=>sv("lr",()=>dbSet("lgr-recurring",{budgets:{list:r}}));
  const saveIncome=i=>sv("li",()=>dbSet("lgr-income",{budgets:{list:i}}));

  // ── Derive actuals from categorized ledger transactions ──────────
  function recomputeActuals(currentTxns,currentActuals,mo,yr){
    const prefix=`${yr}-${pad(mo+1)}`;
    const derived={};
    currentTxns.filter(t=>t.catId&&t.date.startsWith(prefix)&&!t.isAuto&&!t.planned).forEach(t=>{
      const cat=cats.find(c=>c.id===t.catId);
      if(!cat)return;
      if(!derived[t.catId])derived[t.catId]=0;
      if(cat.inc){if(t.amount>0)derived[t.catId]+=t.amount;}
      else{if(t.amount<0)derived[t.catId]+=Math.abs(t.amount);}
    });
    // Merge: ledger-derived takes priority for any catId that has transactions
    // Debt actuals (from dpays) are preserved if not overridden by ledger
    const merged={...currentActuals};
    Object.keys(derived).forEach(k=>{merged[k]=derived[k];});
    return merged;
  }

  // Irregular income
  const effectiveIncome=useMemo(()=>{
    if(!irregIncome)return null;
    const v=[pastIncome.m1,pastIncome.m2,pastIncome.m3].map(x=>parseFloat(x)||0);
    const filled=v.filter(x=>x>0);
    return filled.length?filled.reduce((s,x)=>s+x,0)/filled.length:null;
  },[irregIncome,pastIncome]);

  // Budget handlers
  function onB(id,v){
    const val=parseFloat(v)||0;const b={...budgets,[id]:val};setBudgets(b);sB(b,actuals);
    const linked=debts.find(d=>d.catId===id);
    if(linked){const nd=debts.map(d=>d.id===linked.id?{...d,min:val}:d);setDebts(nd);sD(nd);}
  }
  function syncDebtPayment(catId,newTotal){
    const cat=cats.find(c=>c.id===catId);if(cat?.g!=="debt")return;
    const linked=debts.find(d=>d.catId===catId)||debts.find(d=>resolveDebtCatId(d.name,cats)===catId);
    if(!linked)return;
    const existing=dpays[linked.id]||[];
    const budgetIdx=existing.findIndex(e=>e.note==="Via Budget tab");
    const oldBudgetAmt=budgetIdx>=0?existing[budgetIdx].amt:0;
    const manualTotal=existing.filter((_,i)=>i!==budgetIdx).reduce((s,e)=>s+e.amt,0);
    const budgetAmt=Math.max(0,newTotal-manualTotal);
    let updated;
    if(budgetAmt===0)updated=existing.filter((_,i)=>i!==budgetIdx);
    else if(budgetIdx>=0)updated=existing.map((e,i)=>i===budgetIdx?{...e,amt:budgetAmt,date:new Date().toISOString()}:e);
    else updated=[...existing,{amt:budgetAmt,date:new Date().toISOString(),note:"Via Budget tab"}];
    const p={...dpays,[linked.id]:updated};setDpays(p);sP(p);
    const delta=budgetAmt-oldBudgetAmt;
    if(delta!==0){const nd=debts.map(d=>d.id===linked.id?{...d,bal:Math.max(0,d.bal-delta),catId}:d);setDebts(nd);sD(nd);}
  }
  function onA(id,v){const val=parseFloat(v)||0;const a={...actuals,[id]:val};setActuals(a);sB(budgets,a);syncDebtPayment(id,val);}
  function onQuickAdd(id,amt){
    const add=parseFloat(amt)||0;const val=(actuals[id]||0)+add;
    const a={...actuals,[id]:val};setActuals(a);sB(budgets,a);syncDebtPayment(id,val);
  }
  function onCatLbl(id,v){const nc=cats.map(c=>c.id===id?{...c,lbl:v}:c);setCats(nc);sCats(nc);}
  function onCatIco(id,v){const nc=cats.map(c=>c.id===id?{...c,ico:v}:c);setCats(nc);sCats(nc);}
  function onCatRec(id){const nc=cats.map(c=>c.id===id?{...c,rec:!c.rec}:c);setCats(nc);sCats(nc);}
  function onCatDel(id){if(!confirm("Remove?"))return;const nc=cats.filter(c=>c.id!==id);const nb={...budgets};delete nb[id];const na={...actuals};delete na[id];setCats(nc);setBudgets(nb);setActuals(na);sCats(nc);sB(nb,na);}
  function onCatAdd(grp){const id="c"+Date.now();const nc=[...cats,{id,lbl:"New Item",ico:"📌",g:grp,def:0,inc:grp==="income",rec:false}];const nb={...budgets,[id]:0};setCats(nc);setBudgets(nb);sCats(nc);sB(nb,actuals);}
  function onDE(d){const nd=debts.map(x=>x.id===d.id?d:x);setDebts(nd);sD(nd);}
  function onDD(id){
    if(!confirm("Delete debt?"))return;
    const debt=debts.find(x=>x.id===id);const nd=debts.filter(x=>x.id!==id);setDebts(nd);sD(nd);
    const{[id]:_,...restPays}=dpays;setDpays(restPays);sP(restPays);
    const catId=debt?.catId;
    if(catId){const nc=cats.filter(c=>c.id!==catId);const nb={...budgets};delete nb[catId];const na={...actuals};delete na[catId];setCats(nc);setBudgets(nb);setActuals(na);sCats(nc);sB(nb,na);}
  }
  function onAddDebt(){
    if(!ndf.name)return;const catId="p_"+Date.now();const min=parseFloat(ndf.min)||0;
    const nc=[...cats,{id:catId,lbl:ndf.name,ico:"💳",g:"debt",def:min,rec:true}];
    const nb={...budgets,[catId]:min};
    const nd=[...debts,{id:"d"+Date.now(),name:ndf.name,bal:parseFloat(ndf.bal)||0,apr:parseFloat(ndf.apr)||0,min,col:"#D4CABC",ord:debts.length+1,catId}];
    setCats(nc);setBudgets(nb);setDebts(nd);sCats(nc);sB(nb,actuals);sD(nd);
    setNdf({name:"",bal:"",apr:"",min:""});setShowAddD(false);
  }
  function onPay(){
    if(!newPay.did||!newPay.amt)return;const amt=parseFloat(newPay.amt)||0;
    const p={...dpays,[newPay.did]:[...(dpays[newPay.did]||[]),{amt,date:newPay.date||new Date().toISOString(),note:newPay.note}]};
    setDpays(p);sP(p);
    const nd=debts.map(d=>d.id===newPay.did?{...d,bal:Math.max(0,d.bal-amt)}:d);setDebts(nd);sD(nd);
    const debt=debts.find(d=>d.id===newPay.did);const catId=debt?.catId||resolveDebtCatId(debt?.name||"",cats);
    if(catId){const totalPaid=(p[newPay.did]||[]).reduce((s,x)=>s+x.amt,0);const na={...actuals,[catId]:totalPaid};setActuals(na);sB(budgets,na);}
    setNewPay({did:"",amt:"",note:"",date:""});
  }
  function onDelPay(debtId,idx){
    const pays=dpays[debtId]||[];const removed=pays[idx];if(!removed)return;
    const updated=pays.filter((_,i)=>i!==idx);const p={...dpays,[debtId]:updated};setDpays(p);sP(p);
    const nd=debts.map(d=>d.id===debtId?{...d,bal:d.bal+removed.amt}:d);setDebts(nd);sD(nd);
    const debt=debts.find(d=>d.id===debtId);const catId=debt?.catId||resolveDebtCatId(debt?.name||"",cats);
    if(catId){const na={...actuals,[catId]:updated.reduce((s,x)=>s+x.amt,0)};setActuals(na);sB(budgets,na);}
  }
  function onAcc(k,f,v){const a={...accs,[k]:{...accs[k],[f]:f==="bal"?parseFloat(v)||0:v}};setAccs(a);sA(a);}
  function onAddAcc(){const id="acc"+Date.now();const col=ACC_COLS[Object.keys(accs).length%ACC_COLS.length];const a={...accs,[id]:{name:"New Account",bal:0,col,type:"checking"}};setAccs(a);sA(a);}
  function onDelAcc(k){if(!confirm("Remove?"))return;const{[k]:_,...rest}=accs;setAccs(rest);sA(rest);}
  function onGoalEdit(g){const ng=goals.map(x=>x.id===g.id?g:x);setGoals(ng);sGoals(ng);}
  function onGoalDel(id){if(!confirm("Delete goal?"))return;const ng=goals.filter(x=>x.id!==id);setGoals(ng);sGoals(ng);}
  function onGoalAdd(g){const ng=[...goals,g];setGoals(ng);sGoals(ng);}
  function onGoalPay(gid,amt,note,date){
    const p={...goalPays,[gid]:[...(goalPays[gid]||[]),{amt,date:date||new Date().toISOString(),note}]};setGoalPays(p);sGP(p);
    const ng=goals.map(g=>g.id===gid?{...g,saved:Math.min(g.target,g.saved+amt)}:g);setGoals(ng);sGoals(ng);
  }
  function onAssetVal(id,v){const as=assets.map(a=>a.id===id?{...a,val:parseFloat(v)||0}:a);setAssets(as);sAssets(as);}
  function onAssetName(id,v){const as=assets.map(a=>a.id===id?{...a,name:v}:a);setAssets(as);sAssets(as);}
  function onAssetUpdate(id,ch){const as=assets.map(a=>a.id===id?{...a,...ch}:a);setAssets(as);sAssets(as);}
  function onAddAsset(type="other"){const t=ASSET_TYPES[type];const as=[...assets,{id:"a"+Date.now(),name:t.lbl,val:0,ico:t.ico,type,address:""}];setAssets(as);sAssets(as);}
  function onDelAsset(id){const as=assets.filter(a=>a.id!==id);setAssets(as);sAssets(as);}
  function saveNwSnap(nw){const h=[...nwHist.filter(h=>!(h.mo===viewMonth&&h.yr===viewYear)),{mo:viewMonth,yr:viewYear,nw}].sort((a,b)=>a.yr!==b.yr?a.yr-b.yr:a.mo-b.mo).slice(-12);setNwHist(h);sNwHist(h);}
  function onTheme(key){const t=THEMES[key];setTheme(t);localStorage.setItem("bloomTheme",key);}
  function onName(v){setUserName(v);localStorage.setItem("bloomName",v);}
  function onFocus(v){setFocusMode(v);localStorage.setItem("bloomFocus",v);}
  function onNotes(v){setNotes(v);sNotes(v);}
  function onIrreg(on,past){setIrregIncome(on);setPastIncome(past);sIR({on,past});}

  // Ledger handlers
  const autoTxns=useMemo(()=>generateAutoTxns(viewYear,viewMonth,recurringDebts,incomeStreams),[viewYear,viewMonth,recurringDebts,incomeStreams]);
  const allTxns=useMemo(()=>{
    const manualKeys=new Set(txns.map(t=>t.date+"|"+t.desc+"|"+t.account));
    const filteredAuto=autoTxns.filter(a=>!manualKeys.has(a.date+"|"+a.desc+"|"+a.account));
    return[...txns,...filteredAuto].sort((a,b)=>a.date.localeCompare(b.date));
  },[txns,autoTxns]);
  const withBal=useMemo(()=>{
    const lcRD=lcReset?.date||null,scuRD=scuReset?.date||null;
    let lc=lcRD?parseFloat(lcReset.balance)||0:lcStart;
    let scu=scuRD?parseFloat(scuReset.balance)||0:scuStart;
    return allTxns.filter(t=>{
      if(t.account==="lc"&&lcRD&&t.date<lcRD)return false;
      if(t.account==="scu"&&scuRD&&t.date<scuRD)return false;
      return true;
    }).map(t=>{
      if(t.account==="lc")lc=Math.round((lc+t.amount)*100)/100;
      else scu=Math.round((scu+t.amount)*100)/100;
      return{...t,thisBal:t.account==="lc"?lc:scu,lcNow:lc,scuNow:scu};
    });
  },[allTxns,lcStart,scuStart,lcReset,scuReset]);
  const actualWithBal=useMemo(()=>{
    const lcRD=lcReset?.date||null,scuRD=scuReset?.date||null;
    let lc=lcRD?parseFloat(lcReset.balance)||0:lcStart;
    let scu=scuRD?parseFloat(scuReset.balance)||0:scuStart;
    return allTxns.filter(t=>{
      if(t.isAuto||t.planned)return false;
      if(t.account==="lc"&&lcRD&&t.date<lcRD)return false;
      if(t.account==="scu"&&scuRD&&t.date<scuRD)return false;
      return true;
    }).map(t=>{
      if(t.account==="lc")lc=Math.round((lc+t.amount)*100)/100;
      else scu=Math.round((scu+t.amount)*100)/100;
      return{...t,thisBal:t.account==="lc"?lc:scu,lcNow:lc,scuNow:scu};
    });
  },[allTxns,lcStart,scuStart,lcReset,scuReset]);
  const lastLc=withBal.length?withBal[withBal.length-1].lcNow:lcStart;
  const lastScu=withBal.length?withBal[withBal.length-1].scuNow:scuStart;
  const actualLastLc=actualWithBal.length?actualWithBal[actualWithBal.length-1].lcNow:lcStart;
  const actualLastScu=actualWithBal.length?actualWithBal[actualWithBal.length-1].scuNow:scuStart;
  const monthSummary=useMemo(()=>{
    const prefix=`${viewYear}-${pad(viewMonth+1)}`;
    const mAll=withBal.filter(t=>t.date.startsWith(prefix));
    const mActual=mAll.filter(t=>!t.isAuto);
    const sum=(arr,fn)=>arr.filter(fn).reduce((s,t)=>s+t.amount,0);
    return{actualIncome:sum(mActual,t=>t.amount>0),actualExpenses:Math.abs(sum(mActual,t=>t.amount<0)),projIncome:sum(mAll,t=>t.amount>0),projExpenses:Math.abs(sum(mAll,t=>t.amount<0))};
  },[withBal,viewYear,viewMonth]);
  const monthTxns=useMemo(()=>{
    const prefix=`${viewYear}-${pad(viewMonth+1)}`;
    let rows=withBal.filter(t=>t.date.startsWith(prefix));
    if(acctFilter!=="all")rows=rows.filter(t=>t.account===acctFilter);
    if(descFilter)rows=rows.filter(t=>t.desc.toLowerCase().includes(descFilter.toLowerCase()));
    return rows;
  },[withBal,viewYear,viewMonth,acctFilter,descFilter]);
  const txnsByDay=useMemo(()=>{
    const map={};
    monthTxns.forEach(t=>{const d=parseInt(t.date.split("-")[2]);if(!map[d])map[d]=[];map[d].push(t);});
    return map;
  },[monthTxns]);

  function addTxn(f){
    const newT={id:Date.now().toString(),...f,amount:parseFloat(f.amount)||0};
    const t=[...txns,newT].sort((a,b)=>a.date.localeCompare(b.date));
    setTxns(t);saveTxns(t);setShowAddTxn(false);
    if(f.catId){const merged=recomputeActuals(t,actuals,viewMonth,viewYear);setActuals(merged);sB(budgets,merged);}
  }
  function delTxn(id){
    if(!confirm("Delete this transaction?"))return;
    const removed=txns.find(x=>x.id===id);
    const t=txns.filter(x=>x.id!==id);setTxns(t);saveTxns(t);
    if(removed?.catId){const merged=recomputeActuals(t,actuals,viewMonth,viewYear);setActuals(merged);sB(budgets,merged);}
  }
  function editTxn(f){
    const t=txns.map(x=>x.id===f.id?{...f,amount:parseFloat(f.amount)||0}:x).sort((a,b)=>a.date.localeCompare(b.date));
    setTxns(t);saveTxns(t);setEditTxnId(null);
    const merged=recomputeActuals(t,actuals,viewMonth,viewYear);setActuals(merged);sB(budgets,merged);
  }
  function commitAuto(auto){
    const t=[...txns,{...auto,id:Date.now().toString(),isAuto:false,wasAuto:true}].sort((a,b)=>a.date.localeCompare(b.date));
    setTxns(t);saveTxns(t);
  }
  function revertToAuto(id){const t=txns.filter(x=>x.id!==id);setTxns(t);saveTxns(t);}
  function markPaid(id){const t=txns.map(x=>x.id===id?{...x,planned:false,wasPlanned:true}:x);setTxns(t);saveTxns(t);}
  function revertToPlanned(id){const t=txns.map(x=>x.id===id?{...x,planned:true,wasPlanned:false}:x);setTxns(t);saveTxns(t);}
  function addRecurring(r){const l=[...recurringDebts,r];setRecurringDebts(l);saveRecurring(l);}
  function editRecurring(r){const l=recurringDebts.map(x=>x.id===r.id?r:x);setRecurringDebts(l);saveRecurring(l);}
  function delRecurring(id){const l=recurringDebts.filter(x=>x.id!==id);setRecurringDebts(l);saveRecurring(l);}
  function addIncome(s){const l=[...incomeStreams,s];setIncomeStreams(l);saveIncome(l);}
  function editIncome(s){const l=incomeStreams.map(x=>x.id===s.id?s:x);setIncomeStreams(l);saveIncome(l);}
  function delIncome(id){const l=incomeStreams.filter(x=>x.id!==id);setIncomeStreams(l);saveIncome(l);}

  // Derived totals
  const totInc=useMemo(()=>{
    if(irregIncome&&effectiveIncome)return effectiveIncome;
    return cats.filter(c=>c.inc).reduce((s,c)=>s+(budgets[c.id]||0),0);
  },[cats,budgets,irregIncome,effectiveIncome]);
  const totBud=useMemo(()=>cats.filter(c=>!c.inc).reduce((s,c)=>s+(budgets[c.id]||0),0),[cats,budgets]);
  const totAct=useMemo(()=>cats.filter(c=>!c.inc).reduce((s,c)=>s+(actuals[c.id]||0),0),[cats,actuals]);
  const totDebt=useMemo(()=>debts.reduce((s,d)=>s+d.bal,0),[debts]);
  const totBal=useMemo(()=>Object.values(accs).reduce((s,a)=>s+(a.bal||0),0),[accs]);
  const totAssets=useMemo(()=>assets.reduce((s,a)=>s+a.val,0),[assets]);
  const netWorth=totAssets-totDebt;
  const healthScore=useMemo(()=>calcHealthScore(cats,budgets,actuals,debts,accs,totInc,totBal),[cats,budgets,actuals,debts,accs,totInc,totBal]);
  const split5030=useMemo(()=>calc5030(cats,budgets),[cats,budgets]);

  const sl={idle:"",saving:"Saving…",saved:"✓ Synced",error:"⚠ Error"}[sync];
  const sc={idle:"transparent",saving:T.a,saved:T.a2,error:T.danger}[sync];
  const NAV=[{id:"dashboard",lbl:"Home",ico:"🏠"},{id:"calendar",lbl:"Calendar",ico:"📅"},{id:"ledger",lbl:"Ledger",ico:"📒"},{id:"budget",lbl:"Budget",ico:"📊"},{id:"plan",lbl:"Plan",ico:"🎯"}];

  // Derive short display names from user's account names
  const acctNames=useMemo(()=>({
    lc:(accs.lc?.name||"Checking").split(/[\s(]/)[0].slice(0,10),
    scu:(accs.sc?.name||"Savings").split(/[\s(]/)[0].slice(0,10),
  }),[accs]);

  const shared={T,cats,budgets,actuals,debts,dpays,accs,assets,goals,goalPays,notes,nwHist,acctNames,
    totInc,totBud,totAct,totDebt,totBal,totAssets,netWorth,healthScore,split5030,
    mo:viewMonth,yr:viewYear,userName,focusMode,irregIncome,pastIncome,effectiveIncome,
    onB,onA,onQuickAdd,onCatLbl,onCatIco,onCatRec,onCatDel,onCatAdd,
    onDE,onDD,onPay,onDelPay,newPay,setNewPay,editD,setEditD,showAddD,setShowAddD,ndf,setNdf,onAddDebt,
    onAcc,onAddAcc,onDelAcc,onGoalEdit,onGoalDel,onGoalAdd,onGoalPay,
    onAssetVal,onAssetName,onAssetUpdate,onAddAsset,onDelAsset,
    saveNwSnap,onTheme,onName,onFocus,onNotes,onIrreg,
    txns,allTxns,withBal,monthTxns,txnsByDay,viewYear,viewMonth,setViewYear,setViewMonth,
    showAddTxn,setShowAddTxn,editTxnId,setEditTxnId,addTxn,delTxn,editTxn,
    commitAuto,revertToAuto,markPaid,revertToPlanned,
    acctFilter,setAcctFilter,descFilter,setDescFilter,
    recurringDebts,addRecurring,editRecurring,delRecurring,
    incomeStreams,addIncome,editIncome,delIncome,
    lcStart,scuStart,onStartChange:(acct,val)=>{
      const v=parseFloat(val)||0;
      if(acct==="lc"){
        setLcStart(v);saveSettings(v,scuStart,lcReset,scuReset);
        const na={...accs,lc:{...accs.lc,bal:v}};setAccs(na);sA(na);
      }else{
        setScuStart(v);saveSettings(lcStart,v,lcReset,scuReset);
        const na={...accs,sc:{...accs.sc,bal:v}};setAccs(na);sA(na);
      }
    },
    lcReset,scuReset,onResetChange:(acct,obj)=>{if(acct==="lc"){setLcReset(obj);saveSettings(lcStart,scuStart,obj,scuReset);}else{setScuReset(obj);saveSettings(lcStart,scuStart,lcReset,obj);}},
    lastLc,lastScu,actualLastLc,actualLastScu,actualWithBal,monthSummary,darkMode,setDarkMode,
    doExp:()=>doExport(cats,budgets,actuals,goals,assets,totDebt,viewMonth,viewYear,notes),
    planTab,setPlanTab,
  };

  async function installApp(){if(!installPrompt)return;installPrompt.prompt();const{outcome}=await installPrompt.userChoice;if(outcome==="accepted")setInstallable(false);}

  if(!onboarded) return <OnboardingFlow T={T} onComplete={onOnboardingComplete}/>;

  return(
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:"'Lato',sans-serif",color:T.text,overflowX:"hidden",paddingBottom:92,transition:"background .3s,color .3s"}} className="safe-bottom">
      <div style={{position:"fixed",top:-80,right:-80,width:260,height:260,borderRadius:"60% 40% 70% 30%/50% 60% 40% 50%",background:`radial-gradient(circle,${T.a}28 0%,transparent 70%)`,pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",bottom:-60,left:-60,width:240,height:240,borderRadius:"40% 60% 30% 70%/60% 40% 50% 50%",background:`radial-gradient(circle,${T.a2}20 0%,transparent 70%)`,pointerEvents:"none",zIndex:0}}/>
      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:20,background:T.hdr,backdropFilter:"blur(16px)",borderBottom:`1px solid ${T.div}`,padding:"10px 16px"}} className="safe-top">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:9,color:T.a,fontWeight:700,letterSpacing:"0.11em",textTransform:"uppercase",marginBottom:1}}>{["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()]}, {MO[new Date().getMonth()]} {new Date().getDate()}</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:T.text}}>🌸 Bloom</div>
              {installable&&<button onClick={installApp} style={{background:T.a+"18",border:`1px solid ${T.a}40`,borderRadius:7,padding:"3px 8px",fontSize:11,cursor:"pointer",color:T.a,fontWeight:700}}>⬇ Install</button>}
              <button onClick={()=>{setTab("plan");setPlanTab("settings");}} title="Settings" style={{background:"none",border:`1px solid ${T.div}`,borderRadius:7,padding:"3px 7px",fontSize:14,cursor:"pointer",color:T.lt,lineHeight:1}}>⚙️</button>
            </div>
            <div style={{fontSize:9,color:T.lt,letterSpacing:"0.12em",textTransform:"uppercase"}}>{MO[viewMonth]} {viewYear}</div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {/* Month nav */}
            <button onClick={()=>{if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);}} style={{background:T.a+"14",border:`1px solid ${T.a}28`,borderRadius:8,padding:"4px 10px",fontSize:14,color:T.a,cursor:"pointer"}}>‹</button>
            <button onClick={()=>{if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);}} style={{background:T.a+"14",border:`1px solid ${T.a}28`,borderRadius:8,padding:"4px 10px",fontSize:14,color:T.a,cursor:"pointer"}}>›</button>
            {/* Balance chips — use user's account names */}
            {[{l:acctNames.lc,actual:actualLastLc,proj:lastLc,c:T.a},{l:acctNames.scu,actual:actualLastScu,proj:lastScu,c:T.a2}].map((a,i)=>(
              <div key={i} style={{background:a.c+"12",borderRadius:10,padding:"5px 9px",border:`1px solid ${a.c}28`,textAlign:"right",minWidth:80}}>
                <div style={{fontSize:8,color:a.c,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:2}}>{a.l}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:13,fontWeight:700,color:a.c}}>{fmtD(a.actual)}</div>
                <div style={{fontSize:9,color:a.proj<a.actual?T.danger:T.lt,marginTop:1}}>▸ {fmtD(a.proj)}</div>
              </div>
            ))}
            <div style={{fontSize:11,color:sc,minWidth:50,textAlign:"right"}}>{sl}</div>
          </div>
        </div>
      </div>
      </div>
      {/* Content */}
      <div style={{maxWidth:540,margin:"0 auto",padding:"14px 14px 0",position:"relative",zIndex:1}}>
        {loading
          ?<div style={{textAlign:"center",padding:60,color:T.lt,fontFamily:"'Cormorant Garamond',serif",fontSize:26}}>Loading…</div>
          :tab==="dashboard"?<DashboardPage {...shared}/>
          :tab==="calendar"?<CalendarPage {...shared}/>
          :tab==="ledger"?<LedgerPage {...shared}/>
          :tab==="budget"?<BudgetPage {...shared}/>
          :<PlanPage {...shared}/>
        }
      </div>
      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:20,background:T.nav,backdropFilter:"blur(16px)",borderTop:`1px solid ${T.div}`,display:"flex",padding:"6px 0 18px"}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}>
            <span style={{fontSize:18}}>{n.ico}</span>
            <span style={{fontSize:9,fontWeight:tab===n.id?700:400,color:tab===n.id?T.a:T.lt,letterSpacing:"0.03em"}}>{n.lbl}</span>
            {tab===n.id&&<div style={{width:18,height:2,background:T.a,borderRadius:99}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  DASHBOARD PAGE
// ════════════════════════════════════════════════════════════════
function DashboardPage({T,cats,budgets,actuals,debts,dpays,accs,goals,split5030,healthScore,totInc,totBud,totAct,totDebt,totBal,totAssets,netWorth,mo,yr,userName,focusMode,onFocus,nwHist,actualLastLc,actualLastScu,lastLc,lastScu,monthSummary,recurringDebts,incomeStreams,viewYear,viewMonth}){
  const {text:greetText,emoji:greetEmoji}=getGreeting(userName);
  const quote=QUOTES[mo];
  const rem=totInc-totAct;
  const pct=totInc>0?Math.min(totAct/totInc*100,100):0;
  const top3debts=[...debts].sort((a,b)=>b.apr-a.apr).slice(0,3);
  const totInt=debts.reduce((s,d)=>s+d.bal*(d.apr/100/12),0);
  const {needs,wants,savings}=split5030;
  const splitTotal=needs+wants+savings||1;
  const needsPct=Math.round(needs/splitTotal*100);
  const wantsPct=Math.round(wants/splitTotal*100);
  const savePct=Math.round(savings/splitTotal*100);

  // Upcoming transactions this month
  const todayStr=new Date().toISOString().split("T")[0];
  const prefix=`${viewYear}-${pad(viewMonth+1)}`;
  const upcoming=[];
  recurringDebts.filter(r=>r.active!==false).forEach(r=>{
    const d=Math.min(parseInt(r.day)||1,daysInMonth(viewYear,viewMonth));
    const dateStr=isoDate(viewYear,viewMonth,d);
    if(dateStr>=todayStr&&dateStr.startsWith(prefix))upcoming.push({date:dateStr,desc:r.desc,amount:-(Math.abs(parseFloat(r.amount)||0)),type:"bill"});
  });
  incomeStreams.filter(s=>s.active!==false&&s.amount&&s.lastDate).forEach(s=>{
    const freq=s.frequency||"biweekly";const last=parseISO(s.lastDate);if(!last)return;
    const step=freq==="weekly"?7:freq==="biweekly"?14:0;
    if(freq==="monthly"){const d=Math.min(last.d,daysInMonth(viewYear,viewMonth));const ds=isoDate(viewYear,viewMonth,d);if(ds>=todayStr&&ds.startsWith(prefix))upcoming.push({date:ds,desc:s.name||"Paycheck",amount:parseFloat(s.amount)||0,type:"income"});}
    else{
      let c=new Date(last.y,last.m,last.d);const end=new Date(viewYear,viewMonth+1,0);
      while(c>end)c=new Date(c.getTime()-step*86400000);
      while(c>=new Date(viewYear,viewMonth,1))c=new Date(c.getTime()-step*86400000);
      c=new Date(c.getTime()+step*86400000);let safe=0;
      while(c<=end&&safe<10){safe++;const ds=isoDate(viewYear,viewMonth,c.getDate());if(ds>=todayStr)upcoming.push({date:ds,desc:s.name||"Paycheck",amount:parseFloat(s.amount)||0,type:"income"});c=new Date(c.getTime()+step*86400000);}
    }
  });
  upcoming.sort((a,b)=>a.date.localeCompare(b.date));

  return(
    <div className="fade">
      {/* Greeting */}
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:700,color:T.text,lineHeight:1.1}}>{greetText} {greetEmoji}</div>
        <div style={{fontSize:12,color:T.sub,marginTop:4}}>{MO[mo]} {yr}</div>
      </div>

      {/* Quote */}
      <div style={{background:`linear-gradient(135deg,${T.a}14,${T.a3}0A)`,border:`1px solid ${T.a}20`,borderRadius:16,padding:"13px 16px",marginBottom:13,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-8,left:8,fontSize:60,opacity:.06,color:T.text,fontFamily:"Georgia,serif",lineHeight:1,pointerEvents:"none"}}>"</div>
        <div style={{fontSize:12,color:T.text,lineHeight:1.7,fontStyle:"italic",marginBottom:6,position:"relative"}}>{quote.q}</div>
        <div style={{fontSize:10,letterSpacing:"0.13em",textTransform:"uppercase",color:T.a,fontWeight:700}}>✦ {quote.tag}</div>
      </div>

      {/* Health score */}
      <Card T={T} style={{padding:"15px 17px",marginBottom:12}}>
        <Row style={{marginBottom:11}}>
          <SL T={T} mb={0}>Financial Health Score</SL>
          <div style={{fontSize:10,color:T.lt}}>{healthScore.grade}</div>
        </Row>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:11}}>
          <div style={{flexShrink:0,width:68,height:68,borderRadius:"50%",background:`conic-gradient(${T.a} ${healthScore.score*3.6}deg, ${T.div} 0deg)`,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{width:54,height:54,borderRadius:"50%",background:T.card,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.a}}>{healthScore.score}</div>
            </div>
          </div>
          <div style={{flex:1}}>
            {healthScore.details.map((d,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <span style={{fontSize:11}}>{d.icon}</span>
                <div style={{flex:1,height:4,background:T.div,borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(d.pts/d.max)*100}%`,background:`linear-gradient(90deg,${T.a},${T.a2})`,borderRadius:99}}/>
                </div>
                <span style={{fontSize:10,color:T.lt,width:16,textAlign:"right"}}>{d.pts}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{fontSize:11,color:T.lt,lineHeight:1.6}}>
          {healthScore.details.filter(d=>d.pts<d.max*0.6).map(d=>`${d.icon} ${d.note}`).slice(0,2).join("  ·  ")||"✓ All metrics looking solid — keep it up!"}
        </div>
      </Card>

      {/* Cash flow */}
      <Card T={T} style={{padding:"14px 17px",marginBottom:12}}>
        <SL T={T}>Monthly Cash Flow</SL>
        <div style={{display:"flex",marginBottom:8}}>
          {[{lbl:"Income",v:totInc,c:T.a2},{lbl:"Budgeted",v:totBud,c:T.a},{lbl:"Spent",v:totAct,c:T.a3},{lbl:"Left",v:rem,c:rem>=0?T.a2:T.danger}].map((s,i)=>(
            <div key={i} style={{flex:1,textAlign:"center",borderRight:i<3?`1px solid ${T.div}`:"none"}}>
              <div style={{fontSize:8,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>{s.lbl}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,fontWeight:700,color:s.c}}>{fmt(Math.abs(s.v))}</div>
            </div>
          ))}
        </div>
        <div style={{height:4,background:T.div,borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:pct>90?T.danger:T.a,borderRadius:99,transition:"width .5s"}}/>
        </div>
        {/* Ledger summary */}
        <div style={{display:"flex",gap:4,marginTop:10,padding:"8px 10px",background:T.a+"08",borderRadius:10,border:`1px solid ${T.a}14`}}>
          {[{label:"Actual Income",v:monthSummary.actualIncome,c:T.a2,sign:"+"},{label:"Actual Spend",v:monthSummary.actualExpenses,c:T.danger,sign:"−"},{label:"Ledger Net",v:monthSummary.actualIncome-monthSummary.actualExpenses,c:(monthSummary.actualIncome-monthSummary.actualExpenses)>=0?T.a2:T.danger,sign:""}].map((m,i)=>(
            <div key={i} style={{flex:1,textAlign:"center",borderRight:i<2?`1px solid ${T.div}`:"none",paddingRight:i<2?4:0}}>
              <div style={{fontSize:8,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>{m.label}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:12,fontWeight:700,color:m.c}}>{m.sign}{fmt(Math.abs(m.v))}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* 50/30/20 */}
      <Card T={T} style={{padding:"14px 17px",marginBottom:12}}>
        <Row style={{marginBottom:9}}>
          <SL T={T} mb={0}>50/30/20 Split</SL>
          <span style={{fontSize:10,color:T.lt}}>ideal: 50 · 30 · 20</span>
        </Row>
        <div style={{display:"flex",height:8,borderRadius:99,overflow:"hidden",marginBottom:8,gap:2}}>
          {[{v:needsPct,c:T.a},{v:wantsPct,c:T.a3},{v:savePct,c:T.a2}].map((s,i)=>(
            s.v>0&&<div key={i} style={{flex:s.v,background:s.c,minWidth:4}}/>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
          {[{lbl:"Needs",v:needs,pct:needsPct,ideal:50,c:T.a},{lbl:"Wants",v:wants,pct:wantsPct,ideal:30,c:T.a3},{lbl:"Savings/Debt",v:savings,pct:savePct,ideal:20,c:T.a2}].map((s,i)=>{
            const diff=s.pct-s.ideal;
            return(<div key={i} style={{background:`${s.c}0F`,borderRadius:10,padding:"9px 10px",border:`1px solid ${s.c}20`}}>
              <div style={{fontSize:10,color:T.lt,marginBottom:3}}>{s.lbl}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:s.c}}>{s.pct}%</div>
              <div style={{fontSize:9,color:Math.abs(diff)>10?T.danger:T.lt,marginTop:2}}>ideal {s.ideal}% {diff>3?`▲${diff}`:diff<-3?`▼${Math.abs(diff)}`:" ✓"}</div>
            </div>);
          })}
        </div>
      </Card>

      {/* Upcoming */}
      {upcoming.length>0&&(
        <Card T={T} style={{padding:"14px 17px",marginBottom:12}}>
          <SL T={T}>Upcoming This Month</SL>
          {upcoming.slice(0,5).map((u,i)=>{
            const dateDisp=new Date(u.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
            const isInc=u.amount>0;
            return(<Row key={i} style={{marginBottom:i<Math.min(upcoming.length,5)-1?8:0,alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:isInc?T.a2+"18":T.danger+"12",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>{isInc?"💰":"📆"}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:T.text}}>{u.desc}</div>
                  <div style={{fontSize:10,color:T.lt}}>{dateDisp}</div>
                </div>
              </div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:700,color:isInc?T.a2:T.danger}}>{isInc?"+":"-"}{fmt(Math.abs(u.amount))}</div>
            </Row>);
          })}
        </Card>
      )}

      {/* Top debts */}
      <Card T={T} style={{padding:"15px 17px",marginBottom:20}}>
        <Row style={{marginBottom:10}}>
          <SL T={T} mb={0}>💳 Debt Snapshot</SL>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:T.a}}>{fmt(totDebt)}</div>
            <div style={{fontSize:10,color:T.danger}}>{fmt(totInt)}/mo interest</div>
          </div>
        </Row>
        {top3debts.map(d=>{
          const m2=pmts(d.bal,d.apr,d.min);
          return(<div key={d.id} style={{marginBottom:9}}>
            <Row style={{marginBottom:3}}>
              <span style={{fontSize:13,fontWeight:600}}>{d.name}</span>
              <span style={{fontSize:10,color:d.apr>=25?T.danger:T.lt}}>{d.apr>0?d.apr+"% APR":"0%"} · {plbl(m2)}</span>
            </Row>
            <div style={{height:4,background:T.div,borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.min(d.bal/totDebt*100*3.5,100)}%`,background:d.col,borderRadius:99}}/>
            </div>
          </div>);
        })}
      </Card>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  CALENDAR PAGE
// ════════════════════════════════════════════════════════════════
function CalendarPage({T,viewYear,viewMonth,txnsByDay,monthTxns,withBal,actualWithBal,lcStart,scuStart,commitAuto,revertToAuto,markPaid,revertToPlanned,delTxn,setEditTxnId,editTxnId,editTxn,addTxn,showAddTxn,setShowAddTxn,cats,acctNames}){
  const dim=daysInMonth(viewYear,viewMonth);
  const firstDow=new Date(viewYear,viewMonth,1).getDay();
  const todayStr=new Date().toISOString().split("T")[0];
  const prefix=`${viewYear}-${pad(viewMonth+1)}`;
  const deps=monthTxns.reduce((s,t)=>s+(t.amount>0?t.amount:0),0);
  const wds=monthTxns.reduce((s,t)=>s+(t.amount<0?t.amount:0),0);
  const [selectedDay,setSelectedDay]=useState(null);
  const selectedTxns=selectedDay?txnsByDay[selectedDay]||[]:[];

  return(
    <div className="fade">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[{l:"Deposits",v:deps,c:T.a2},{l:"Withdrawals",v:wds,c:T.danger},{l:"Net",v:deps+wds,c:deps+wds>=0?T.a2:T.danger},{l:"Transactions",v:monthTxns.length,c:T.a3,raw:true}].map((s,i)=>(
          <div key={i} style={{background:T.card,borderRadius:12,padding:"10px 8px",border:`1px solid ${T.border}`,textAlign:"center"}}>
            <div style={{fontSize:8,color:T.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>{s.l}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,fontWeight:700,color:s.c}}>{s.raw?s.v:fmt(s.v)}</div>
          </div>
        ))}
      </div>

      <Card T={T} style={{padding:"14px",marginBottom:12}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
          {DAY_NAMES.map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:T.lt,fontWeight:700,letterSpacing:"0.08em"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {Array.from({length:firstDow}).map((_,i)=><div key={"e"+i}/>)}
          {Array.from({length:dim}).map((_,i)=>{
            const d=i+1;
            const dayTxns=txnsByDay[d]||[];
            const dateStr=isoDate(viewYear,viewMonth,d);
            const isToday=dateStr===todayStr;
            const isSelected=selectedDay===d;
            const hasAuto=dayTxns.some(t=>t.isAuto);
            const hasPlanned=dayTxns.some(t=>t.planned&&!t.isAuto);
            const hasDep=dayTxns.some(t=>t.amount>0&&!t.planned);
            const hasWd=dayTxns.some(t=>t.amount<0&&!t.planned&&!t.isAuto);
            // Projected balance for future days
            const isFuture=dateStr>todayStr;
            const projBal=isFuture?(()=>{const upTo=withBal.filter(t=>t.date<=dateStr);const last=upTo[upTo.length-1];return last?last.lcNow+last.scuNow:null;})():null;
            return(
              <button key={d} onClick={()=>setSelectedDay(isSelected?null:d)}
                style={{aspectRatio:"1",borderRadius:9,border:`1.5px solid ${isSelected?T.a+"60":isToday?T.a2+"50":"transparent"}`,background:isSelected?T.a+"18":isToday?T.a2+"10":"rgba(255,255,255,0.4)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:2,position:"relative"}}>
                <span style={{fontSize:12,fontWeight:isToday||isSelected?700:400,color:isSelected?T.a:isToday?T.a2:T.text}}>{d}</span>
                {projBal!==null&&<div style={{fontSize:7,color:projBal<0?T.danger:T.lt,lineHeight:1,marginTop:1}}>{projBal<0?"−":""}${Math.abs(Math.round(projBal/1000))}k</div>}
                {dayTxns.length>0&&(
                  <div style={{display:"flex",gap:2,marginTop:1}}>
                    {hasDep&&<div style={{width:4,height:4,borderRadius:"50%",background:T.a2}}/>}
                    {hasWd&&<div style={{width:4,height:4,borderRadius:"50%",background:T.danger}}/>}
                    {hasAuto&&<div style={{width:4,height:4,borderRadius:"50%",background:T.warn,opacity:.8}}/>}
                    {hasPlanned&&<div style={{width:4,height:4,borderRadius:"50%",background:T.a3,opacity:.8}}/>}
                  </div>
                )}
              </button>
            );
          })}
        </div>
        <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:10,fontSize:10,color:T.lt}}>
          {[[T.a2,"Deposit"],[T.danger,"Withdrawal"],[T.warn,"Auto"],[T.a3,"Planned"]].map(([c,l])=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:c}}/><span>{l}</span>
            </div>
          ))}
        </div>
      </Card>

      {/* Selected day detail */}
      {selectedDay&&(()=>{
        const selDateStr=isoDate(viewYear,viewMonth,selectedDay);
        const planUpTo=withBal.filter(t=>t.date<=selDateStr);
        const lastPlan=planUpTo[planUpTo.length-1];
        const dayPlanLc=lastPlan!=null?lastPlan.lcNow:(lcStart??0);
        const dayPlanScu=lastPlan!=null?lastPlan.scuNow:(scuStart??0);
        const actUpTo=(actualWithBal||[]).filter(t=>t.date<=selDateStr);
        const lastAct=actUpTo[actUpTo.length-1];
        const dayActLc=lastAct!=null?lastAct.lcNow:(lcStart??0);
        const dayActScu=lastAct!=null?lastAct.scuNow:(scuStart??0);
        return(
          <div style={{background:T.card,borderRadius:16,padding:"13px 15px",border:`1.5px solid ${T.a}25`,marginBottom:12}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,marginBottom:10}}>
              {MO[viewMonth]} {selectedDay}, {viewYear}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
              {[{l:"LC / Main",c:T.a,actual:dayActLc,planned:dayPlanLc},{l:"SCU",c:T.a2,actual:dayActScu,planned:dayPlanScu}].map((a,i)=>(
                <div key={i} style={{background:a.c+"0E",borderRadius:11,padding:"9px 11px",border:`1px solid ${a.c}28`}}>
                  <div style={{fontSize:9,color:a.c,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>{a.l}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                    <span style={{fontSize:9,color:T.lt}}>Actual</span>
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:a.c}}>{fmtD(a.actual)}</span>
                  </div>
                  <div style={{height:1,background:a.c+"18",marginBottom:3}}/>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                    <span style={{fontSize:9,color:T.lt}}>Planned</span>
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,fontWeight:600,color:a.planned<a.actual?T.danger:a.c,opacity:.85}}>{fmtD(a.planned)}</span>
                  </div>
                </div>
              ))}
            </div>
            {selectedTxns.length===0
              ?<div style={{fontSize:13,color:T.lt,textAlign:"center",padding:"12px 0"}}>No transactions this day</div>
              :selectedTxns.map((t,i)=>{
                const col=t.account==="lc"?T.a:T.a2;
                const neg=t.amount<0;
                if(editTxnId===t.id)return <TxnForm key={t.id} T={T} init={{...t}} title="Edit" onSave={editTxn} onCancel={()=>setEditTxnId(null)} cats={cats} acctNames={acctNames}/>;
                return(
                  <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,background:t.isAuto?T.warn+"0A":t.planned?T.a3+"0C":"rgba(255,255,255,0.5)",borderRadius:10,padding:"9px 10px",border:`1px solid ${t.isAuto?T.warn+"25":t.planned?T.a3+"30":T.div}`,marginBottom:i<selectedTxns.length-1?6:0}}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:t.planned?T.a3:col,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.desc}</div>
                      <div style={{fontSize:9,color:t.planned?T.a3:col,textTransform:"uppercase",letterSpacing:"0.08em"}}>{t.account==="lc"?(acctNames?.lc||"Acct 1"):(acctNames?.scu||"Acct 2")} · {fmtD(t.thisBal)}</div>
                      {t.isAuto&&<div style={{fontSize:9,color:T.warn,marginTop:1}}>⟳ Auto-scheduled</div>}
                      {t.planned&&<div style={{fontSize:9,color:T.a3,marginTop:1}}>🗓 Planned</div>}
                      {t.catId&&<div style={{fontSize:9,color:T.a2,marginTop:1}}>📊 Categorized</div>}
                    </div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:t.planned?T.a3:neg?T.danger:T.a2,flexShrink:0,opacity:t.planned?.75:1}}>
                      {neg?"":"+"}{fmtD(t.amount)}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0}}>
                      {t.isAuto
                        ?<button onClick={()=>commitAuto(t)} style={{fontSize:11,background:T.a2+"18",border:`1px solid ${T.a2}35`,borderRadius:7,padding:"3px 6px",color:T.a2,cursor:"pointer"}}>✓ confirm</button>
                        :t.planned
                          ?<button onClick={()=>markPaid(t.id)} style={{fontSize:11,background:T.a2+"18",border:`1px solid ${T.a2}35`,borderRadius:7,padding:"3px 6px",color:T.a2,cursor:"pointer"}}>✓ paid</button>
                          :<>
                            {t.wasPlanned&&<button onClick={()=>revertToPlanned(t.id)} style={{fontSize:10,background:T.a3+"18",border:`1px solid ${T.a3}40`,borderRadius:6,padding:"2px 5px",color:T.a3,cursor:"pointer"}}>↺ plan</button>}
                            {t.wasAuto&&<button onClick={()=>revertToAuto(t.id)} style={{fontSize:10,background:T.warn+"18",border:`1px solid ${T.warn}40`,borderRadius:6,padding:"2px 5px",color:T.warn,cursor:"pointer"}}>↺ auto</button>}
                            <div style={{display:"flex",gap:3}}>
                              <button onClick={()=>setEditTxnId(t.id)} style={{fontSize:12,background:"none",border:"none",cursor:"pointer",color:T.lt,padding:"2px"}}>✏️</button>
                              <button onClick={()=>delTxn(t.id)} style={{fontSize:12,background:"none",border:"none",cursor:"pointer",color:T.danger,padding:"2px"}}>×</button>
                            </div>
                          </>
                      }
                    </div>
                  </div>
                );
              })
            }
          </div>
        );
      })()}

      {!showAddTxn
        ?<button onClick={()=>setShowAddTxn(true)} style={{width:"100%",padding:"11px",borderRadius:14,background:T.a+"10",border:`1.5px dashed ${T.a}45`,fontSize:13,fontWeight:700,color:T.a,cursor:"pointer"}}>+ Add Transaction</button>
        :<TxnForm T={T} onSave={addTxn} onCancel={()=>setShowAddTxn(false)} init={{date:selectedDay?isoDate(viewYear,viewMonth,selectedDay):today(),desc:"",amount:"",account:"lc",note:""}} cats={cats} acctNames={acctNames}/>
      }
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  LEDGER PAGE
// ════════════════════════════════════════════════════════════════
function LedgerPage({T,monthTxns,showAddTxn,setShowAddTxn,editTxnId,setEditTxnId,addTxn,delTxn,editTxn,commitAuto,revertToAuto,markPaid,revertToPlanned,acctFilter,setAcctFilter,descFilter,setDescFilter,cats,acctNames}){
  return(
    <div className="fade">
      {!showAddTxn&&!editTxnId&&(
        <button onClick={()=>setShowAddTxn(true)} style={{width:"100%",marginBottom:12,padding:"11px",borderRadius:14,background:T.a+"10",border:`1.5px dashed ${T.a}45`,fontSize:13,fontWeight:700,color:T.a,cursor:"pointer"}}>
          + Add Transaction
        </button>
      )}
      {showAddTxn&&<TxnForm T={T} onSave={addTxn} onCancel={()=>setShowAddTxn(false)} cats={cats} acctNames={acctNames}/>}
      {!showAddTxn&&!editTxnId&&(
        <div style={{display:"flex",gap:7,marginBottom:12}}>
          <input value={descFilter} onChange={e=>setDescFilter(e.target.value)} placeholder="🔍 Search…"
            style={{flex:1,padding:"7px 11px",borderRadius:10,border:`1.5px solid ${T.div}`,background:"rgba(255,255,255,0.7)",fontSize:12,color:T.text,outline:"none"}}/>
          <div style={{display:"flex",gap:4}}>
            {[["all","All"],["lc",acctNames?.lc||"Acct 1"],["scu",acctNames?.scu||"Acct 2"]].map(([v,l])=>(
              <button key={v} onClick={()=>setAcctFilter(v)}
                style={{padding:"6px 10px",borderRadius:9,border:`1.5px solid ${acctFilter===v?T.a+"50":T.div}`,background:acctFilter===v?T.a+"14":"rgba(255,255,255,0.6)",fontSize:11,fontWeight:acctFilter===v?700:400,color:acctFilter===v?T.a:T.lt,cursor:"pointer"}}>
                {l}
              </button>
            ))}
          </div>
        </div>
      )}
      {monthTxns.length===0&&!showAddTxn&&(
        <div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:42,marginBottom:12}}>📒</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:T.text,marginBottom:8}}>No transactions yet</div>
          <div style={{fontSize:13,color:T.sub,lineHeight:1.6,marginBottom:16}}>This is where every dollar you spend or receive gets logged. Your running balance updates automatically.</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,maxWidth:260,margin:"0 auto"}}>
            <div style={{background:T.card,borderRadius:12,padding:"10px 14px",border:`1px solid ${T.border}`,textAlign:"left",fontSize:12,color:T.lt}}>
              <span style={{fontWeight:700,color:T.text}}>+ Add Transaction</span> above to log income or spending
            </div>
            <div style={{background:T.card,borderRadius:12,padding:"10px 14px",border:`1px solid ${T.border}`,textAlign:"left",fontSize:12,color:T.lt}}>
              <span style={{fontWeight:700,color:T.text}}>Plan → Recurring</span> to auto-schedule paychecks and bills
            </div>
          </div>
        </div>
      )}
      {monthTxns.map((t,i)=>{
        const col=t.account==="lc"?T.a:T.a2;const neg=t.amount<0;
        if(editTxnId===t.id)return <TxnForm key={t.id} T={T} init={{...t}} title="Edit Transaction" onSave={editTxn} onCancel={()=>setEditTxnId(null)} cats={cats} acctNames={acctNames}/>;
        return(
          <div key={t.id} style={{background:t.isAuto?T.warn+"0A":t.planned?T.a3+"0C":T.card,borderRadius:13,padding:"10px 12px",border:`1px solid ${t.isAuto?T.warn+"20":t.planned?T.a3+"25":T.border}`,marginBottom:7}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:t.planned?T.a3:col,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{fontSize:14,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.desc}</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:t.planned?T.a3:neg?T.danger:T.a2,flexShrink:0,marginLeft:8,opacity:t.planned?.75:1}}>
                    {neg?"":"+"}{fmtD(t.amount)}
                  </div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:2}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:10,color:col,textTransform:"uppercase",letterSpacing:"0.08em"}}>{t.account==="lc"?(acctNames?.lc||"Acct 1"):(acctNames?.scu||"Acct 2")}</span>
                    <span style={{fontSize:10,color:T.lt}}>{t.date}</span>
                    {t.catId&&<span style={{fontSize:9,color:T.a3,background:T.a3+"14",borderRadius:4,padding:"1px 5px"}}>📊</span>}
                    {t.isAuto&&<span style={{fontSize:9,color:T.warn}}>⟳ auto</span>}
                    {t.planned&&<span style={{fontSize:9,color:T.a3}}>🗓 planned</span>}
                  </div>
                  <span style={{fontSize:10,color:T.lt,fontFamily:"'Cormorant Garamond',serif"}}>bal {fmtD(t.thisBal)}</span>
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:5,marginTop:7,justifyContent:"flex-end"}}>
              {t.isAuto
                ?<button onClick={()=>commitAuto(t)} style={{fontSize:11,background:T.a2+"18",border:`1px solid ${T.a2}30`,borderRadius:7,padding:"3px 8px",color:T.a2,cursor:"pointer"}}>✓ Confirm</button>
                :t.planned
                  ?<button onClick={()=>markPaid(t.id)} style={{fontSize:11,background:T.a2+"18",border:`1px solid ${T.a2}30`,borderRadius:7,padding:"3px 8px",color:T.a2,cursor:"pointer"}}>✓ Paid</button>
                  :<>
                    {t.wasAuto&&<button onClick={()=>revertToAuto(t.id)} style={{fontSize:10,background:T.warn+"14",border:`1px solid ${T.warn}30`,borderRadius:6,padding:"2px 7px",color:T.warn,cursor:"pointer"}}>↺ auto</button>}
                    <button onClick={()=>setEditTxnId(t.id)} style={{fontSize:12,background:T.a+"10",border:`1px solid ${T.a}25`,borderRadius:7,padding:"3px 8px",color:T.a,cursor:"pointer"}}>✏️ Edit</button>
                    <button onClick={()=>delTxn(t.id)} style={{fontSize:12,background:T.danger+"10",border:`1px solid ${T.danger}25`,borderRadius:7,padding:"3px 8px",color:T.danger,cursor:"pointer"}}>× Delete</button>
                  </>
              }
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  BUDGET PAGE
// ════════════════════════════════════════════════════════════════
function BudgetPage({T,cats,budgets,actuals,debts,onB,onA,onQuickAdd,onCatLbl,onCatIco,onCatRec,onCatDel,onCatAdd,totInc,totBud,totAct,irregIncome,pastIncome,effectiveIncome,onIrreg}){
  const [editMode,setEditMode]=useState(false);
  const rem=totInc-totAct;
  const [localPast,setLocalPast]=useState(pastIncome);
  const [quickVals,setQuickVals]=useState({});
  function toggleIrreg(){const on=!irregIncome;onIrreg(on,localPast);}
  function updatePast(field,val){const p={...localPast,[field]:val};setLocalPast(p);if(irregIncome)onIrreg(true,p);}
  function doQuickAdd(catId){const v=parseFloat(quickVals[catId])||0;if(!v)return;onQuickAdd(catId,v);setQuickVals(q=>({...q,[catId]:""}));}
  const pct=totInc>0?Math.min(totAct/totInc*100,100):0;
  return(
    <div className="fade">
      <Row style={{marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:T.text}}>Budget Planner</div>
          <div style={{fontSize:12,color:T.sub,marginTop:2}}>{editMode?"✏️ Edit mode":"Planned vs. actual"}</div>
        </div>
        <Btn T={T} onClick={()=>setEditMode(e=>!e)} accent={editMode?T.a2:T.a} style={{padding:"7px 13px",fontSize:12}}>{editMode?"✓ Done":"✏️ Edit"}</Btn>
      </Row>

      {/* Variable income toggle */}
      <Card T={T} style={{padding:"13px 15px",marginBottom:13,border:`1px solid ${T.a2}25`}}>
        <Row>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:T.text}}>📊 Variable Income Mode</div>
            <div style={{fontSize:11,color:T.lt,marginTop:2}}>Freelance, gig, or commission? Use a 3-month average.</div>
          </div>
          <button onClick={()=>toggleIrreg()} style={{width:46,height:24,borderRadius:99,background:irregIncome?T.a2:T.div,border:"none",cursor:"pointer",position:"relative",transition:"background .3s",flexShrink:0}}>
            <div style={{position:"absolute",top:2,left:irregIncome?23:2,width:20,height:20,borderRadius:"50%",background:"white",transition:"left .25s",boxShadow:"0 1px 4px rgba(0,0,0,.25)"}}/>
          </button>
        </Row>
        {irregIncome&&(
          <div style={{marginTop:11,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
            {[{f:"m1",lbl:"3 mo ago"},{f:"m2",lbl:"2 mo ago"},{f:"m3",lbl:"Last mo"}].map(x=>(
              <div key={x.f}>
                <div style={{fontSize:9,color:T.lt,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.1em"}}>{x.lbl}</div>
                <div style={{position:"relative"}}>
                  <span style={{position:"absolute",left:7,top:"50%",transform:"translateY(-50%)",fontSize:10,color:T.a2,fontWeight:700}}>$</span>
                  <input type="number" value={localPast[x.f]||""} onChange={e=>updatePast(x.f,e.target.value)} style={{width:"100%",padding:"6px 6px 6px 17px",fontSize:13,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${T.a2}30`,borderRadius:9,background:`${T.a2}09`,color:T.text,outline:"none",boxSizing:"border-box"}}/>
                </div>
              </div>
            ))}
            {effectiveIncome&&<div style={{gridColumn:"1/-1",marginTop:5,padding:"8px 12px",background:`${T.a2}12`,borderRadius:10,border:`1px solid ${T.a2}25`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12,color:T.text,fontWeight:600}}>3-month average</span>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:T.a2}}>{fmt(effectiveIncome)}/mo</span>
            </div>}
          </div>
        )}
      </Card>

      {!editMode&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 72px 72px 80px",gap:4,marginBottom:10,padding:"0 2px"}}>
          <div/><div style={{textAlign:"center",fontSize:9,color:T.a,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>Planned</div>
          <div style={{textAlign:"center",fontSize:9,color:T.a2,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>Actual</div>
          <div style={{textAlign:"center",fontSize:9,color:T.a3,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>+ Add Spend</div>
        </div>
      )}

      {Object.entries(GRP).map(([gid,g])=>{
        const gc=cats.filter(c=>c.g===gid);
        if(!gc.length&&!editMode)return null;
        const gb=gc.reduce((s,c)=>s+(budgets[c.id]||0),0);
        const ga=gc.reduce((s,c)=>s+(actuals[c.id]||0),0);
        const gO=!gc.some(c=>c.inc)&&ga>gb&&gb>0;
        return(
          <div key={gid} style={{marginBottom:14}}>
            <Row style={{padding:"7px 11px",background:`${g.col}18`,borderRadius:11,border:`1px solid ${g.col}22`,marginBottom:7}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:13}}>{g.ico}</span>
                <span style={{fontSize:13,fontWeight:700,color:T.text}}>{g.lbl}</span>
              </div>
              {!editMode&&<div style={{display:"flex",gap:12}}>
                <span style={{fontSize:12,fontWeight:700,color:T.a}}>{fmt(gb)}</span>
                <span style={{fontSize:12,fontWeight:700,color:gO?T.danger:T.a2}}>{fmt(ga)}</span>
              </div>}
            </Row>
            {gc.map(cat=>{
              const bv=budgets[cat.id]||0,av=actuals[cat.id]||0,ov=!cat.inc&&av>bv&&bv>0;
              const linkedDebt=debts?.find(d=>d.catId===cat.id);
              if(editMode)return(
                <div key={cat.id} style={{display:"flex",gap:5,alignItems:"center",marginBottom:5,background:T.card,borderRadius:11,padding:"7px 9px",border:`1px solid ${T.border}`}}>
                  <input value={cat.ico} onChange={e=>onCatIco(cat.id,e.target.value)} style={{width:30,textAlign:"center",fontSize:14,border:`1.5px solid ${T.a}22`,borderRadius:7,padding:"3px 1px",background:`${T.a}08`,outline:"none",color:T.text,flexShrink:0}}/>
                  <input value={cat.lbl} onChange={e=>onCatLbl(cat.id,e.target.value)} style={{flex:1,fontSize:12,border:`1.5px solid ${T.a}20`,borderRadius:7,padding:"5px 7px",background:`${T.a}05`,color:T.text,outline:"none"}}/>
                  <div style={{position:"relative",width:70}}>
                    <span style={{position:"absolute",left:5,top:"50%",transform:"translateY(-50%)",fontSize:9,color:T.a,fontWeight:700}}>$</span>
                    <input type="number" value={budgets[cat.id]||""} onChange={e=>onB(cat.id,e.target.value)} style={{width:"100%",padding:"5px 4px 5px 13px",fontSize:12,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${T.a}28`,borderRadius:7,background:`${T.a}0C`,color:T.text,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <button onClick={()=>onCatRec(cat.id)} style={{width:24,height:24,borderRadius:"50%",border:`1.5px solid ${cat.rec?T.a2:T.lt}40`,background:cat.rec?`${T.a2}18`:"transparent",color:cat.rec?T.a2:T.lt,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>↻</button>
                  <button onClick={()=>onCatDel(cat.id)} style={{width:24,height:24,borderRadius:"50%",border:`1.5px solid ${T.danger}30`,background:`${T.danger}08`,color:T.danger,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>×</button>
                </div>
              );
              return(
                <div key={cat.id} style={{display:"grid",gridTemplateColumns:"1fr 72px 72px 80px",gap:4,alignItems:"center",marginBottom:4,background:T.card,borderRadius:11,padding:"6px 8px",border:`1px solid ${T.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,overflow:"hidden"}}>
                    <span style={{fontSize:12,flexShrink:0}}>{cat.ico}</span>
                    <span style={{fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:T.text}}>{cat.lbl}</span>
                    {cat.rec&&<span style={{fontSize:9,color:T.a2,flexShrink:0}}>↻</span>}
                    {linkedDebt&&<span style={{fontSize:8,color:T.a,background:`${T.a}15`,borderRadius:4,padding:"1px 4px",flexShrink:0}}>⇄</span>}
                  </div>
                  <div style={{position:"relative"}}>
                    <span style={{position:"absolute",left:5,top:"50%",transform:"translateY(-50%)",fontSize:9,color:T.a,fontWeight:700,pointerEvents:"none"}}>$</span>
                    <input type="number" value={budgets[cat.id]||""} onChange={e=>onB(cat.id,e.target.value)} style={{width:"100%",padding:"5px 2px 5px 13px",fontSize:12,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${T.a}30`,borderRadius:8,background:`${T.a}09`,color:T.text,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{position:"relative"}}>
                    <span style={{position:"absolute",left:5,top:"50%",transform:"translateY(-50%)",fontSize:9,color:ov?T.danger:T.a2,fontWeight:700,pointerEvents:"none"}}>$</span>
                    <input type="number" value={actuals[cat.id]||""} onChange={e=>onA(cat.id,e.target.value)} style={{width:"100%",padding:"5px 2px 5px 13px",fontSize:12,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${ov?T.danger:T.a2}30`,borderRadius:8,background:ov?`${T.danger}08`:`${T.a2}09`,color:ov?T.danger:T.text,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  {!cat.inc?(
                    <div style={{display:"flex",gap:2,alignItems:"center"}}>
                      <div style={{position:"relative",flex:1}}>
                        <span style={{position:"absolute",left:4,top:"50%",transform:"translateY(-50%)",fontSize:9,color:T.a3,fontWeight:700,pointerEvents:"none"}}>$</span>
                        <input type="number" placeholder="0" value={quickVals[cat.id]||""} onChange={e=>setQuickVals(q=>({...q,[cat.id]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&doQuickAdd(cat.id)} style={{width:"100%",padding:"5px 2px 5px 12px",fontSize:11,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${T.a3}28`,borderRadius:8,background:`${T.a3}08`,color:T.text,outline:"none",boxSizing:"border-box"}}/>
                      </div>
                      <button onClick={()=>doQuickAdd(cat.id)} disabled={!quickVals[cat.id]} style={{width:20,height:20,borderRadius:"50%",border:`1.5px solid ${T.a3}50`,background:quickVals[cat.id]?`${T.a3}20`:"transparent",color:T.a3,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:quickVals[cat.id]?1:0.3,fontWeight:700,lineHeight:1}}>+</button>
                    </div>
                  ):<div/>}
                </div>
              );
            })}
            {editMode&&<button onClick={()=>onCatAdd(gid)} style={{width:"100%",padding:"6px",borderRadius:10,background:"transparent",border:`1.5px dashed ${g.col}55`,fontSize:12,color:g.col,fontWeight:600,cursor:"pointer",marginTop:2}}>+ Add to {g.lbl}</button>}
          </div>
        );
      })}

      {!editMode&&(
        <Card T={T} style={{padding:"13px 17px",marginBottom:20}}>
          {[{lbl:"Total Income",v:totInc,c:T.a2},{lbl:"Total Budgeted",v:totBud,c:T.a},{lbl:"Total Spent",v:totAct,c:totAct>totInc?T.danger:T.a3}].map((s,i)=>(
            <Row key={i} style={{marginBottom:7}}>
              <span style={{fontSize:13,fontWeight:600}}>{s.lbl}</span>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:s.c}}>{fmt(s.v)}</span>
            </Row>
          ))}
          <div style={{borderTop:`1px solid ${T.div}`,marginTop:4,paddingTop:10}}>
            <Row>
              <div>
                <span style={{fontSize:14,fontWeight:700}}>Remaining Actual</span>
                <div style={{fontSize:10,color:T.lt,marginTop:1}}>Income − spent</div>
              </div>
              <div style={{textAlign:"right"}}>
                <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:rem<0?T.danger:T.a2}}>{fmt(Math.abs(rem))}</span>
                <div style={{fontSize:10,color:rem<0?T.danger:T.lt,marginTop:1}}>{rem<0?"⚠ over spent":"left to spend"}</div>
              </div>
            </Row>
          </div>
          <div style={{marginTop:12}}>
            <div style={{height:5,background:T.div,borderRadius:99,overflow:"hidden",marginBottom:4}}>
              <div style={{height:"100%",width:`${Math.min(totAct/Math.max(totBud,totInc,1)*100,100)}%`,background:totAct>totBud?T.danger:T.a2,borderRadius:99,transition:"width .5s"}}/>
            </div>
            <Row style={{fontSize:10,color:T.lt}}>
              <span>Spent {totBud>0?Math.round(totAct/totBud*100):0}% of budget</span>
              <span>{totInc>0?Math.round(totAct/totInc*100):0}% of income</span>
            </Row>
          </div>
        </Card>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  PLAN PAGE — Debt / Goals / Net Worth sub-tabs
// ════════════════════════════════════════════════════════════════
function PlanPage(props){
  const {T,planTab,setPlanTab}=props;
  const PTABS=[{id:"debt",lbl:"💳 Debts"},{id:"goals",lbl:"⭐ Goals"},{id:"worth",lbl:"🏦 Net Worth"},{id:"recurring",lbl:"🔁 Recurring"},{id:"settings",lbl:"⚙️ Settings"}];
  return(
    <div className="fade">
      <div style={{display:"flex",gap:0,overflowX:"auto",marginBottom:14,background:T.card,borderRadius:14,padding:"4px",border:`1px solid ${T.border}`}}>
        {PTABS.map(t=>(
          <button key={t.id} onClick={()=>setPlanTab(t.id)}
            style={{flex:1,padding:"7px 6px",borderRadius:10,border:"none",background:planTab===t.id?`${T.a}20`:"transparent",fontSize:11,fontWeight:planTab===t.id?700:400,color:planTab===t.id?T.a:T.lt,cursor:"pointer",transition:"all .2s",whiteSpace:"nowrap"}}>
            {t.lbl}
          </button>
        ))}
      </div>
      {planTab==="debt"&&<DebtTab {...props}/>}
      {planTab==="goals"&&<GoalsTab {...props}/>}
      {planTab==="worth"&&<NetWorthTab {...props}/>}
      {planTab==="recurring"&&<RecurringTab {...props}/>}
      {planTab==="settings"&&<SettingsTab {...props}/>}
    </div>
  );
}

// ── Debt Tab ─────────────────────────────────────────────────────
function DebtTab({T,debts,dpays,onDE,onDD,onPay,onDelPay,newPay,setNewPay,editD,setEditD,showAddD,setShowAddD,ndf,setNdf,onAddDebt,totDebt}){
  const totInt=useMemo(()=>debts.reduce((s,d)=>s+d.bal*(d.apr/100/12),0),[debts]);
  const sorted=useMemo(()=>[...debts].sort((a,b)=>a.ord-b.ord),[debts]);
  return(
    <div>
      <Row style={{marginBottom:13}}>
        <div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:600,color:T.text}}>Debt Tracker</div></div>
        <div style={{textAlign:"right"}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:T.a}}>{fmt(totDebt)}</div>
          <div style={{fontSize:10,color:T.danger}}>{fmt(totInt)}/mo interest</div>
        </div>
      </Row>
      {/* Log Payment */}
      <Card T={T} style={{padding:"13px 15px",marginBottom:11}}>
        <SL T={T}>Log a Payment</SL>
        <select value={newPay.did} onChange={e=>setNewPay(p=>({...p,did:e.target.value}))} style={{width:"100%",padding:"8px 11px",borderRadius:10,border:`1.5px solid ${T.a}35`,background:T.card,color:T.text,fontSize:13,marginBottom:7,outline:"none",colorScheme:T.dark?"dark":"light"}}>
          <option value="">Select debt…</option>
          {sorted.map(d=><option key={d.id} value={d.id}>{d.name} — {fmt(d.bal)}</option>)}
        </select>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:7}}>
